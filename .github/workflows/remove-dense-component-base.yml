name: Remove Dense Component Base

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/remove-dense-component-base.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Remove IComponent inheritance from dense data components
        run: python .github/scripts/remove_dense_component_base.py

      - name: Remove one-time files
        run: |
          rm .github/scripts/remove_dense_component_base.py
          rm .github/workflows/remove-dense-component-base.yml

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "refactor: remove dense component base inheritance"
          git push origin HEAD:refactor/ecs-scheduler-foundation
