name: Connect Component Query

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/connect-component-query.yml

permissions:
  contents: write

jobs:
  connect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Connect query view to registry
        run: python .github/scripts/connect_component_query.py

      - name: Remove one-time files
        run: |
          rm .github/scripts/connect_component_query.py
          rm .github/workflows/connect-component-query.yml

      - name: Commit query integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "feat: connect allocation-free component queries"
          git push origin HEAD:refactor/ecs-scheduler-foundation
