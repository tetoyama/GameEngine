name: Direct Paged Storage Smoke Test

on:
  pull_request:
    branches:
      - master
    paths:
      - "Source/GameApplication/Engine/Scene/Registry/componentRegistry.h"
      - "Source/GameApplication/Engine/Scene/Registry/entityRegistry.h"
      - "Source/GameApplication/Engine/Scene/Config/SceneStorageConfig.h"
      - "Source/GameApplication/Engine/Scene/Config/SceneStorageRuntime.h"
      - "Source/GameApplication/Engine/Scene/Config/SceneStorageYaml.h"
      - "Source/GameApplication/Engine/Scene/Config/SceneStoragePreloader.h"
      - "Source/GameApplication/Engine/Scene/Component/componentList.h"
      - "Source/GameApplication/Engine/Scene/Component/EntityStateComponents.h"
      - "Source/GameApplication/Engine/Scene/Component/CullingComponent.h"
      - "Source/GameApplication/Engine/Scene/Query/ComponentQueryView.h"
      - "Source/GameApplication/Engine/Scene/System/Transform/transformSystem.cpp"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Source/GameApplication/Engine/Scene/Storage/ComponentStorageFactory.h"
      - "Source/GameApplication/Engine/Scene/Storage/ComponentStorageStrategy.h"
      - "Source/GameApplication/Engine/Scene/Storage/DirectPagedComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Interface/IComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Entity/Entity.h"
      - "Source/GameApplication/Engine/Editor/UI/Inspector.cpp"
      - "Tests/DirectPagedComponentStorageTest.cpp"
      - "Tests/ComponentStorageTelemetrySmokeTest.cpp"
      - "Tests/SceneStorageConfigSmokeTest.cpp"
      - "Tests/SceneStorageRuntimeSmokeTest.cpp"
      - "Tests/SceneStorageYamlSmokeTest.cpp"
      - "Tests/SceneStoragePreloaderSmokeTest.cpp"
      - "Tests/Data/SceneStoragePreloader.yaml"
      - ".github/workflows/direct-paged-storage.yml"
  push:
    branches:
      - refactor/ecs-scheduler-foundation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run DirectPaged storage smoke test
        id: direct_paged
        continue-on-error: true
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /wd4201 /wd4458 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/DirectPagedComponentStorageTest.cpp
          /Fe:direct-paged-storage-test.exe
          > direct-paged-storage.log 2>&1
          && direct-paged-storage-test.exe >> direct-paged-storage.log 2>&1
      - name: Upload DirectPaged diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-paged-storage-diagnostics
          path: direct-paged-storage.log
          if-no-files-found: error
      - name: Preserve DirectPaged result
        if: steps.direct_paged.outcome == 'failure'
        run: cmd /c exit 1
      - name: Compile and run component storage telemetry smoke test
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /wd4201 /wd4458 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/ComponentStorageTelemetrySmokeTest.cpp
          /Fe:component-storage-telemetry-test.exe
          && component-storage-telemetry-test.exe
      - name: Compile and run Scene storage config smoke test
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /wd4201 /wd4458 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/SceneStorageConfigSmokeTest.cpp
          /Fe:scene-storage-config-test.exe
          && scene-storage-config-test.exe
      - name: Compile and run Scene storage runtime smoke test
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /wd4201 /wd4458 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/SceneStorageRuntimeSmokeTest.cpp
          /Fe:scene-storage-runtime-test.exe
          /link /NODEFAULTLIB:yaml-cppd.lib
          && scene-storage-runtime-test.exe
      - name: Compile Scene storage YAML contract
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX /c
          /wd4201 /wd4458 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/SceneStorageYamlSmokeTest.cpp
          /Fo:scene-storage-yaml-test.obj
      - name: Compile Scene storage preloader contract
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX /c
          /wd4201 /wd4458 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/SceneStoragePreloaderSmokeTest.cpp
          /Fo:scene-storage-preloader-test.obj
