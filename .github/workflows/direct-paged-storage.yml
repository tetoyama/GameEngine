name: Direct Paged Storage Smoke Test

on:
  pull_request:
    branches:
      - master
    paths:
      - "Source/GameApplication/Engine/Scene/Registry/componentRegistry.h"
      - "Source/GameApplication/Engine/Scene/Registry/entityRegistry.h"
      - "Source/GameApplication/Engine/Scene/Config/SceneStorageConfig.h"
      - "Source/GameApplication/Engine/Scene/Component/componentList.h"
      - "Source/GameApplication/Engine/Scene/Component/EntityStateComponents.h"
      - "Source/GameApplication/Engine/Scene/Component/CullingComponent.h"
      - "Source/GameApplication/Engine/Scene/Query/ComponentQueryView.h"
      - "Source/GameApplication/Engine/Scene/System/Transform/transformSystem.cpp"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Source/GameApplication/Engine/Scene/Storage/ComponentStorageFactory.h"
      - "Source/GameApplication/Engine/Scene/Storage/ComponentStorageStrategy.h"
      - "Source/GameApplication/Engine/Scene/Storage/DirectPagedComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Interface/IComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Entity/Entity.h"
      - "Source/GameApplication/Engine/Editor/UI/Inspector.cpp"
      - "Tests/DirectPagedComponentStorageTest.cpp"
      - "Tests/SceneStorageConfigSmokeTest.cpp"
      - ".github/workflows/direct-paged-storage.yml"
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - "Source/GameApplication/Engine/Scene/Registry/componentRegistry.h"
      - "Source/GameApplication/Engine/Scene/Registry/entityRegistry.h"
      - "Source/GameApplication/Engine/Scene/Config/SceneStorageConfig.h"
      - "Source/GameApplication/Engine/Scene/Component/componentList.h"
      - "Source/GameApplication/Engine/Scene/Component/EntityStateComponents.h"
      - "Source/GameApplication/Engine/Scene/Component/CullingComponent.h"
      - "Source/GameApplication/Engine/Scene/Query/ComponentQueryView.h"
      - "Source/GameApplication/Engine/Scene/System/Transform/transformSystem.cpp"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Source/GameApplication/Engine/Scene/Storage/ComponentStorageFactory.h"
      - "Source/GameApplication/Engine/Scene/Storage/ComponentStorageStrategy.h"
      - "Source/GameApplication/Engine/Scene/Storage/DirectPagedComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Interface/IComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Entity/Entity.h"
      - "Source/GameApplication/Engine/Editor/UI/Inspector.cpp"
      - "Tests/DirectPagedComponentStorageTest.cpp"
      - "Tests/SceneStorageConfigSmokeTest.cpp"
      - ".github/workflows/direct-paged-storage.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run DirectPaged storage smoke test
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX /MTd
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          Tests/DirectPagedComponentStorageTest.cpp
          /Fe:direct-paged-storage-test.exe
          && direct-paged-storage-test.exe
      - name: Compile and run Scene storage config smoke test
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX /MTd
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          Tests/SceneStorageConfigSmokeTest.cpp
          /Fe:scene-storage-config-test.exe
          && scene-storage-config-test.exe
