name: Static Batch Foundation Smoke Test

on:
  pull_request:
    branches: [master]
    paths:
      - "Source/GameApplication/Engine/Scene/Component/meshRendererComponent.h"
      - "Source/GameApplication/Engine/Scene/sceneManager.cpp"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/MeshLocalBoundsBuilder.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchUploadSystem.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchCandidateTypes.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchResourceKey.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchPacketCache.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchInstanceDataBuffer.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchGpuInstanceBuffer.h"
      - "Source/GameApplication/Service/Graphics/RHI/**"
      - "Tests/StaticBatchCandidateStorageSmokeTest.cpp"
      - "Tests/StaticBatchResourceKeySmokeTest.cpp"
      - "Tests/StaticBatchInstanceDataBufferSmokeTest.cpp"
      - "Tests/StaticBatchFrameBufferIntegrationSmokeTest.cpp"
      - "Tests/StaticBatchGpuInstanceBufferSmokeTest.cpp"
      - "Tests/StaticBatchUploadSystemSmokeTest.cpp"
      - ".github/workflows/static-batch-candidate.yml"
  push:
    branches: [refactor/ecs-scheduler-foundation]
    paths:
      - "Source/GameApplication/Engine/Scene/Component/meshRendererComponent.h"
      - "Source/GameApplication/Engine/Scene/sceneManager.cpp"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/MeshLocalBoundsBuilder.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchUploadSystem.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchCandidateTypes.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchResourceKey.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchPacketCache.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchInstanceDataBuffer.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchGpuInstanceBuffer.h"
      - "Source/GameApplication/Service/Graphics/RHI/**"
      - "Tests/StaticBatchCandidateStorageSmokeTest.cpp"
      - "Tests/StaticBatchResourceKeySmokeTest.cpp"
      - "Tests/StaticBatchInstanceDataBufferSmokeTest.cpp"
      - "Tests/StaticBatchFrameBufferIntegrationSmokeTest.cpp"
      - "Tests/StaticBatchGpuInstanceBufferSmokeTest.cpp"
      - "Tests/StaticBatchUploadSystemSmokeTest.cpp"
      - ".github/workflows/static-batch-candidate.yml"
  workflow_dispatch:

concurrency:
  group: static-batch-foundation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: Tests/StaticBatchCandidateStorageSmokeTest.cpp
            output: static-batch-candidate-test.exe
          - source: Tests/StaticBatchResourceKeySmokeTest.cpp
            output: static-batch-resource-key-test.exe
          - source: Tests/StaticBatchInstanceDataBufferSmokeTest.cpp
            output: static-batch-instance-data-test.exe
          - source: Tests/StaticBatchFrameBufferIntegrationSmokeTest.cpp
            output: static-batch-frame-buffer-integration-test.exe
          - source: Tests/StaticBatchGpuInstanceBufferSmokeTest.cpp
            output: static-batch-gpu-instance-buffer-test.exe
          - source: Tests/StaticBatchUploadSystemSmokeTest.cpp
            output: static-batch-upload-system-test.exe
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run static batch contract
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /D_CRT_SECURE_NO_WARNINGS
          /wd4100 /wd4201 /wd4458 /wd4471 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          ${{ matrix.source }}
          /Fe:${{ matrix.output }}
          /link /NODEFAULTLIB:yaml-cppd.lib
          && ${{ matrix.output }}
