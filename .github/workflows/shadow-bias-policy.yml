name: Shadow Bias Policy Contract

on:
  pull_request:
    branches: [master]
    paths:
      - "Source/Shader/commonDefine.h"
      - "Source/Shader/common.hlsl"
      - "Source/GameApplication/Engine/Scene/Component/LightComponentDefaults.h"
      - "Source/GameApplication/Engine/Scene/Component/Operations/LightComponentOperations.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/LightGpuSubmissionPolicy.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/ShadowBiasPolicy.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/ShadowBiasPolicyCore.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/ShadowBiasSynchronization.h"
      - "Tests/ShadowBiasPolicySmokeTest.cpp"
      - "Tests/LightShadowParticipationSmokeTest.cpp"
      - ".github/workflows/shadow-bias-policy.yml"
  push:
    branches: [refactor/ecs-scheduler-foundation]
    paths:
      - "Source/Shader/commonDefine.h"
      - "Source/Shader/common.hlsl"
      - "Source/GameApplication/Engine/Scene/Component/LightComponentDefaults.h"
      - "Source/GameApplication/Engine/Scene/Component/Operations/LightComponentOperations.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/LightGpuSubmissionPolicy.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/ShadowBiasPolicy.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/ShadowBiasPolicyCore.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Lighting/ShadowBiasSynchronization.h"
      - "Tests/ShadowBiasPolicySmokeTest.cpp"
      - "Tests/LightShadowParticipationSmokeTest.cpp"
      - ".github/workflows/shadow-bias-policy.yml"
  workflow_dispatch:

concurrency:
  group: shadow-bias-policy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shadow-bias-policy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run bias policy
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX /MTd
          /D_CRT_SECURE_NO_WARNINGS
          /wd4100 /wd4201 /wd4458 /wd4471
          /I Source
          /I Source/GameApplication
          Tests/ShadowBiasPolicySmokeTest.cpp
          /Fe:shadow-bias-policy-test.exe
          && shadow-bias-policy-test.exe
      - name: Compile and run submission synchronization
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX /MTd
          /D_CRT_SECURE_NO_WARNINGS
          /wd4100 /wd4201 /wd4458 /wd4471
          /I Source
          /I Source/GameApplication
          Tests/LightShadowParticipationSmokeTest.cpp
          /Fe:light-shadow-participation-test.exe
          && light-shadow-participation-test.exe
      - name: Guard stable policy include
        shell: pwsh
        run: |
          $entry = Get-Content -Raw -Path "Source/GameApplication/Engine/Scene/System/Render/Lighting/ShadowBiasPolicy.h"
          if ($entry -notmatch 'ShadowBiasPolicyCore\.h') {
            throw "ShadowBiasPolicy.h must remain the stable include entry point."
          }
