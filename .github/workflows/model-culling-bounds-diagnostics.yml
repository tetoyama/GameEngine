name: Model Culling Bounds Diagnostics

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile model bounds test
        id: compile
        continue-on-error: true
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /D_CRT_SECURE_NO_WARNINGS
          /wd4100 /wd4201 /wd4458 /wd4471 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/ModelCullingBoundsProviderSmokeTest.cpp
          /Fe:model-culling-bounds-provider-test.exe
          > model-culling-bounds-provider.log 2>&1
          && model-culling-bounds-provider-test.exe >> model-culling-bounds-provider.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-culling-bounds-diagnostics
          path: model-culling-bounds-provider.log
          if-no-files-found: error
      - name: Preserve result
        if: steps.compile.outcome == 'failure'
        run: cmd /c exit 1
