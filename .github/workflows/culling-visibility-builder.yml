name: Culling Visibility Builder Smoke Test

on:
  pull_request:
    branches:
      - master
    paths:
      - "Source/GameApplication/Engine/Scene/Component/CullingComponent.h"
      - "Source/GameApplication/Engine/Scene/Component/EntityStateComponents.h"
      - "Source/GameApplication/Engine/Scene/Registry/componentRegistry.cpp"
      - "Source/GameApplication/Engine/Scene/Registry/componentRegistry.h"
      - "Source/GameApplication/Engine/Scene/Registry/entityRegistry.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/CullingMath.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/CullingVisibilitySet.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/CullingVisibilityBuilder.h"
      - "Tests/CullingVisibilityBuilderSmokeTest.cpp"
      - ".github/workflows/culling-visibility-builder.yml"
  push:
    branches:
      - refactor/ecs-scheduler-foundation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run visibility builder contract
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /wd4100 /wd4201 /wd4458 /wd4471 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/CullingVisibilityBuilderSmokeTest.cpp
          Source/GameApplication/Engine/Scene/Registry/componentRegistry.cpp
          /Fe:culling-visibility-builder-test.exe
          /link /NODEFAULTLIB:yaml-cppd.lib
          && culling-visibility-builder-test.exe
