name: Apply DI Repair

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Tools/Migration/apply_di_repair.py
      - .github/workflows/apply-di-repair.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply verified source replacements
        run: python Tools/Migration/apply_di_repair.py

      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm Tools/Migration/apply_di_repair.py
          git rm .github/workflows/apply-di-repair.yml
          git add -A
          git commit -m "refactor: complete context-owned physics release path"
          git push origin HEAD:refactor/ecs-scheduler-foundation
