name: Editor Panel Optimization Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/editor-panel-optimization-migration.yml
      - Tools/Migrations/optimize_editor_panels.py

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply editor panel optimizations
        run: python Tools/Migrations/optimize_editor_panels.py

      - name: Remove temporary migration files
        run: |
          rm Tools/Migrations/optimize_editor_panels.py
          rm .github/workflows/editor-panel-optimization-migration.yml

      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Engine/Editor/UI/AssetsBrowser.h
          git add Source/GameApplication/Engine/Editor/UI/AssetsBrowser.cpp
          git add Source/GameApplication/Engine/Editor/UI/Hierarchy.h
          git add Source/GameApplication/Engine/Editor/UI/Hierarchy.cpp
          git add Source/GameApplication/Service/DebugTools/DebugSystem.h
          git add Source/GameApplication/Engine/Editor/UI/DebugLogWindow.h
          git add Source/GameApplication/Engine/Editor/UI/DebugLogWindow.cpp
          git add Tools/Migrations/optimize_editor_panels.py
          git add .github/workflows/editor-panel-optimization-migration.yml
          git diff --cached --exit-code && exit 0
          git commit -m "perf: cache editor panel data and reduce repeated scans [skip ci]"
          git push origin HEAD:refactor/ecs-scheduler-foundation
