name: Fix Script Inspector Min

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/fix-script-inspector-min.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Patch std min call
        shell: python
        run: |
          from pathlib import Path

          path = Path("Source/GameApplication/Engine/Scene/Component/scriptComponent.cpp")
          text = path.read_text(encoding="utf-8-sig")
          old = "const size_t copySize = std::min("
          new = "const size_t copySize = (std::min)("

          if text.count(old) != 1:
              raise RuntimeError(f"Expected one std::min call, found {text.count(old)}")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/fix-script-inspector-min.yml").unlink()

      - name: Commit min macro fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "fix: avoid Windows min macro in script inspector"
          git push origin HEAD:refactor/ecs-scheduler-foundation
