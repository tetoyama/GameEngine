name: Apply RenderGraph Lifetime Analysis

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Tools/Migration/add_render_graph_lifetime.py
      - .github/workflows/apply-render-graph-lifetime.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0
      - run: python Tools/Migration/add_render_graph_lifetime.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git rm Tools/Migration/add_render_graph_lifetime.py
          git rm .github/workflows/apply-render-graph-lifetime.yml
          git add -A
          git commit -m "feat: analyze RenderGraph transient resource lifetimes"
          git push --force origin HEAD:render-graph-lifetime-output
