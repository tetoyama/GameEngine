name: Patch Script Parameter Resolver

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/patch-script-parameter-resolver.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Patch ScriptSystem resolver
        shell: python
        run: |
          from pathlib import Path

          path = Path("Source/GameApplication/Engine/Scene/System/Script/ScriptSystem.cpp")
          text = path.read_text(encoding="utf-8-sig")

          old = '''\tnewModuleAPI.deserialize = reinterpret_cast<ScriptDeserializeFunction>(
          \t\tGetProcAddress(newModule, "DeserializeScriptState")
          \t);

          \tauto newImGuiContextFunction = reinterpret_cast<SetImGuiContextFunc>(
          '''

          new = '''\tnewModuleAPI.deserialize = reinterpret_cast<ScriptDeserializeFunction>(
          \t\tGetProcAddress(newModule, "DeserializeScriptState")
          \t);
          \tnewModuleAPI.getParameterCount = reinterpret_cast<ScriptGetParameterCountFunction>(
          \t\tGetProcAddress(newModule, "GetScriptParameterCount")
          \t);
          \tnewModuleAPI.getParameter = reinterpret_cast<ScriptGetParameterFunction>(
          \t\tGetProcAddress(newModule, "GetScriptParameter")
          \t);
          \tnewModuleAPI.setIntegerParameter = reinterpret_cast<ScriptSetIntegerParameterFunction>(
          \t\tGetProcAddress(newModule, "SetScriptIntegerParameter")
          \t);
          \tnewModuleAPI.setFloatParameter = reinterpret_cast<ScriptSetFloatParameterFunction>(
          \t\tGetProcAddress(newModule, "SetScriptFloatParameter")
          \t);
          \tnewModuleAPI.setBooleanParameter = reinterpret_cast<ScriptSetBooleanParameterFunction>(
          \t\tGetProcAddress(newModule, "SetScriptBooleanParameter")
          \t);
          \tnewModuleAPI.setStringParameter = reinterpret_cast<ScriptSetStringParameterFunction>(
          \t\tGetProcAddress(newModule, "SetScriptStringParameter")
          \t);

          \tauto newImGuiContextFunction = reinterpret_cast<SetImGuiContextFunc>(
          '''

          if text.count(old) != 1:
              raise RuntimeError(f"Expected resolver block once, found {text.count(old)}")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/patch-script-parameter-resolver.yml").unlink()

      - name: Commit resolver patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "feat: resolve script parameter bridge exports"
          git push origin HEAD:refactor/ecs-scheduler-foundation
