name: Fix EntityRef cross-module linkage

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/fix-entity-ref-linkage.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply linkage-safe context resolver
        shell: python
        run: |
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8-sig")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one match in {path}, found {count}"
                  )
              write(path, text.replace(old, new, 1))

          scene_h = "Source/GameApplication/Engine/Scene/scene.h"
          replace_once(
              scene_h,
              """class PrefabSystem;\n\n// シーン内の各レジストリ・マネージャへのポインタをまとめたコンテキスト\nstruct SceneContext{\n""",
              """class PrefabSystem;\n\nstruct SceneContext;\nusing SceneContextResolver = SceneContext* (*)(void* owner, uint32_t contextID);\n\n// シーン内の各レジストリ・マネージャへのポインタをまとめたコンテキスト\nstruct SceneContext{\n"""
          )
          replace_once(
              scene_h,
              """\t// SceneManagerが発行する、このSceneContext固有のID。\n\t// 0は未登録または無効なContextを表す。\n\tuint32_t contextID = 0;\n\n\t// レジストリ\n""",
              """\t// SceneManagerが発行する、このSceneContext固有のID。\n\t// 0は未登録または無効なContextを表す。\n\tuint32_t contextID = 0;\n\n\t// EntityRefなどが外部モジュールからContextを解決するためのコールバック。\n\t// SceneManagerの非inlineメソッドを直接呼ばないため、DLL間の未解決シンボルを防ぐ。\n\tvoid* resolverOwner = nullptr;\n\tSceneContextResolver resolver = nullptr;\n\n\t// レジストリ\n"""
          )

          scene_cpp = "Source/GameApplication/Engine/Scene/scene.cpp"
          replace_once(
              scene_cpp,
              """\tm_SceneContext.entity = m_entityRegistry.get();\n\tm_SceneContext.component = m_componentRegistry.get();\n\tm_SceneContext.prefab = m_prefabSystem.get();\n\n\t// Context IDを初期化時に発行し、描画や参照側で安定して利用できるようにする。\n\tif(m_SceneManagerContext->sceneManager){\n\t\tm_SceneManagerContext->sceneManager->GetIDFromContext(&m_SceneContext);\n\t}\n""",
              """\tm_SceneContext.entity = m_entityRegistry.get();\n\tm_SceneContext.component = m_componentRegistry.get();\n\tm_SceneContext.prefab = m_prefabSystem.get();\n\n\t// EntityRefはこの関数ポインタ経由でContext IDを解決する。\n\t// 呼び出し先はGameEngine側に置かれるため、Script DLLはSceneManager.cppを\n\t// 直接リンクする必要がない。\n\tm_SceneContext.resolverOwner = m_SceneManagerContext->sceneManager;\n\tm_SceneContext.resolver = [](void* owner, uint32_t contextID) -> SceneContext* {\n\t\tif(!owner || contextID == 0) return nullptr;\n\t\treturn static_cast<SceneManager*>(owner)->GetContextFromID(contextID);\n\t};\n\n\t// Context IDを初期化時に発行し、描画や参照側で安定して利用できるようにする。\n\tif(m_SceneManagerContext->sceneManager){\n\t\tm_SceneManagerContext->sceneManager->GetIDFromContext(&m_SceneContext);\n\t}\n"""
          )
          replace_once(
              scene_cpp,
              """\tm_SceneContext.prefab = nullptr;\n\tm_SceneContext.manager = nullptr;\n""",
              """\tm_SceneContext.prefab = nullptr;\n\tm_SceneContext.resolverOwner = nullptr;\n\tm_SceneContext.resolver = nullptr;\n\tm_SceneContext.manager = nullptr;\n"""
          )

          entity_ref_h = "Source/GameApplication/Engine/Scene/Reference/EntityRef.h"
          write(
              entity_ref_h,
              """// =======================================================================\n// \n// EntityRef.h\n// \n// =======================================================================\n#pragma once\n#include <cstdint>\n\n#include \"../Entity/Entity.h\"\n#include \"scene.h\"\n#include \"Registry/entityRegistry.h\"\n\n// エンティティへの安全なリファレンス。\n// SceneManagerのメソッドを直接呼ばず、SceneContextに登録された解決コールバックを使う。\n// これによりScript DLLなど別モジュールから利用しても外部シンボルを要求しない。\nstruct EntityRef {\n\tEntityRef() = default;\n\n\tEntityRef(Entity e, SceneContext* ctx)\n\t\t: m_entity(e) {\n\t\tif(!ctx || ctx->contextID == 0 || !ctx->resolver){\n\t\t\treturn;\n\t\t}\n\n\t\tm_contextID = ctx->contextID;\n\t\tm_resolverOwner = ctx->resolverOwner;\n\t\tm_resolver = ctx->resolver;\n\t}\n\n\tbool IsValid() const {\n\t\tSceneContext* context = ResolveContext();\n\t\tif(!context || !context->entity) return false;\n\t\treturn context->entity->IsAlive(m_entity);\n\t}\n\n\tEntity Get() const {\n\t\treturn IsValid() ? m_entity : 0;\n\t}\n\n\tEntity GetEntityID() const { return m_entity; }\n\n\tSceneContext* GetScene() const { return ResolveContext(); }\n\n\tuint32_t GetContextID() const { return m_contextID; }\n\n\texplicit operator bool() const {\n\t\treturn IsValid();\n\t}\n\n\tbool operator==(const EntityRef& other) const {\n\t\treturn m_entity == other.m_entity &&\n\t\t\tm_resolverOwner == other.m_resolverOwner &&\n\t\t\tm_contextID == other.m_contextID;\n\t}\n\n\tbool operator!=(const EntityRef& other) const {\n\t\treturn !(*this == other);\n\t}\n\nprivate:\n\tSceneContext* ResolveContext() const {\n\t\tif(!m_resolver || !m_resolverOwner || m_contextID == 0){\n\t\t\treturn nullptr;\n\t\t}\n\t\treturn m_resolver(m_resolverOwner, m_contextID);\n\t}\n\n\tEntity m_entity = 0;\n\tvoid* m_resolverOwner = nullptr;\n\tSceneContextResolver m_resolver = nullptr;\n\tuint32_t m_contextID = 0;\n};\n"""
          )

          Path(".github/workflows/fix-entity-ref-linkage.yml").unlink()

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "fix: remove EntityRef link dependency on SceneManager"
          git push origin HEAD:refactor/ecs-scheduler-foundation
