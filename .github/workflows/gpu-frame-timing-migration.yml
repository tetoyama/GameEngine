name: GPU Frame Timing Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/gpu-frame-timing-migration.yml
      - Tools/Migrations/add_gpu_frame_timing.py

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply GPU timing migration
        run: python Tools/Migrations/add_gpu_frame_timing.py

      - name: Remove temporary migration files
        run: |
          rm Tools/Migrations/add_gpu_frame_timing.py
          rm .github/workflows/gpu-frame-timing-migration.yml

      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Service/Graphics/graphicsContext.cpp
          git add Tools/Migrations/add_gpu_frame_timing.py
          git add .github/workflows/gpu-frame-timing-migration.yml
          git diff --cached --exit-code && exit 0
          git commit -m "feat: implement asynchronous D3D11 GPU frame timing [skip ci]"
          git push origin HEAD:refactor/ecs-scheduler-foundation
