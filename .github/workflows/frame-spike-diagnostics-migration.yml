name: Frame Spike Diagnostics Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/frame-spike-diagnostics-migration.yml
      - Tools/Migrations/add_frame_spike_diagnostics.py

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply frame spike diagnostics
        run: python Tools/Migrations/add_frame_spike_diagnostics.py

      - name: Remove temporary migration files
        run: |
          rm Tools/Migrations/add_frame_spike_diagnostics.py
          rm .github/workflows/frame-spike-diagnostics-migration.yml

      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Engine/engine.cpp
          git add Source/GameApplication/Engine/Editor/UI/AssetsBrowser.h
          git add Source/GameApplication/Engine/Editor/UI/PerformanceMonitor.h
          git add Source/GameApplication/Engine/Editor/UI/PerformanceMonitor.cpp
          git add Tools/Migrations/add_frame_spike_diagnostics.py
          git add .github/workflows/frame-spike-diagnostics-migration.yml
          git diff --cached --exit-code && exit 0
          git commit -m "feat: capture frame spike diagnostics [skip ci]"
          git push origin HEAD:refactor/ecs-scheduler-foundation
