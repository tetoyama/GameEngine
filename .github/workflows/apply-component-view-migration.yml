name: Apply Component View Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/apply-component-view-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply typed component view migration
        run: python .github/scripts/migrate_component_views.py

      - name: Remove one-time migration files
        run: |
          rm .github/scripts/migrate_component_views.py
          rm .github/workflows/apply-component-view-migration.yml

      - name: Commit migrated consumers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "refactor: migrate component view consumers"
          git push origin HEAD:refactor/ecs-scheduler-foundation
