name: Apply SceneContext lifetime fixes

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/apply-scene-context-lifetime.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply targeted source fixes
        shell: python
        run: |
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8-sig")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one match in {path}, found {count}"
                  )
              write(path, text.replace(old, new, 1))

          scene_h = "Source/GameApplication/Engine/Scene/scene.h"
          replace_once(
              scene_h,
              "#include <memory>\n#include <vector>\n",
              "#include <memory>\n#include <vector>\n#include <cstdint>\n"
          )
          replace_once(
              scene_h,
              """\t// マネージャコンテキスト\n\tSceneManagerContext* manager = nullptr;\n\n\t// レジストリ\n""",
              """\t// マネージャコンテキスト\n\tSceneManagerContext* manager = nullptr;\n\n\t// SceneManagerが発行する、このSceneContext固有のID。\n\t// 0は未登録または無効なContextを表す。\n\tuint32_t contextID = 0;\n\n\t// レジストリ\n"""
          )

          scene_manager_h = "Source/GameApplication/Engine/Scene/sceneManager.h"
          replace_once(
              scene_manager_h,
              """\t// IDからポインタを安全に取得\n\tSceneContext* GetContextFromID(uint32_t id);\n\n\tvoid AddScene(std::shared_ptr<Scene> scene);\n""",
              """\t// IDからポインタを安全に取得\n\tSceneContext* GetContextFromID(uint32_t id);\n\t// Scene破棄時に登録を解除し、古いIDからの解決を無効化する\n\tvoid UnregisterContext(SceneContext* ctx);\n\n\tvoid AddScene(std::shared_ptr<Scene> scene);\n"""
          )

          scene_manager_cpp = "Source/GameApplication/Engine/Scene/sceneManager.cpp"
          replace_once(
              scene_manager_cpp,
              """void SceneManager::Shutdown(){\n\tif(m_SceneContext.debug){\n\t\tm_SceneContext.debug->LOG_INFO(\"SceneManager を終了します\");\n\t}\n\tfor(auto& [name, scene] : m_activeScenes){\n\t\tscene->Shutdown();\n\t\tscene.reset();\n\t}\n\tm_activeScenes.clear();\n\tsystemRegistry->EncodeAll(m_SceneContext.config->editorConfig);\n\n\tsystemRegistry->FinalizeAll();\n\tsystemRegistry.reset();\n}\n\nuint32_t SceneManager::GetIDFromContext(SceneContext* ctx){\n\tif(ctx == nullptr) return 0;\n\n\t// 既に登録されているか確認\n\tfor(auto const& [id, registeredCtx] : m_contextRegistry){\n\t\tif(registeredCtx == ctx) return id;\n\t}\n\n\t// 新規登録\n\tuint32_t newID = m_nextContextID++;\n\tm_contextRegistry[newID] = ctx;\n\treturn newID;\n}\n\nSceneContext* SceneManager::GetContextFromID(uint32_t id){\n\tif(id == 0) return nullptr;\n\n\tauto it = m_contextRegistry.find(id);\n\tif(it != m_contextRegistry.end()){\n\t\treturn it->second;\n\t}\n\treturn nullptr;\n}\n""",
              """void SceneManager::Shutdown(){\n\tif(m_SceneContext.debug){\n\t\tm_SceneContext.debug->LOG_INFO(\"SceneManager を終了します\");\n\t}\n\n\tfor(auto& [name, scene] : m_activeScenes){\n\t\tif(scene){\n\t\t\tscene->Shutdown();\n\t\t\tscene.reset();\n\t\t}\n\t}\n\tm_activeScenes.clear();\n\n\t// Scene::Shutdown() が個別登録を解除するが、異常終了経路で残った\n\t// Contextもここで確実に無効化する。\n\tm_contextRegistry.clear();\n\n\tif(systemRegistry){\n\t\tsystemRegistry->EncodeAll(m_SceneContext.config->editorConfig);\n\t\tsystemRegistry->FinalizeAll();\n\t\tsystemRegistry.reset();\n\t}\n\tm_SceneContext.systemRegistry = nullptr;\n}\n\nuint32_t SceneManager::GetIDFromContext(SceneContext* ctx){\n\tif(ctx == nullptr) return 0;\n\n\t// SceneContext自身が保持するIDを使い、線形探索を避ける。\n\tif(ctx->contextID != 0){\n\t\tauto it = m_contextRegistry.find(ctx->contextID);\n\t\tif(it != m_contextRegistry.end() && it->second == ctx){\n\t\t\treturn ctx->contextID;\n\t\t}\n\n\t\t// Context側だけに古いIDが残っていた場合は再登録する。\n\t\tctx->contextID = 0;\n\t}\n\n\tconst uint32_t newID = m_nextContextID++;\n\tm_contextRegistry[newID] = ctx;\n\tctx->contextID = newID;\n\treturn newID;\n}\n\nSceneContext* SceneManager::GetContextFromID(uint32_t id){\n\tif(id == 0) return nullptr;\n\n\tauto it = m_contextRegistry.find(id);\n\treturn it != m_contextRegistry.end() ? it->second : nullptr;\n}\n\nvoid SceneManager::UnregisterContext(SceneContext* ctx){\n\tif(ctx == nullptr) return;\n\n\tif(ctx->contextID != 0){\n\t\tauto it = m_contextRegistry.find(ctx->contextID);\n\t\tif(it != m_contextRegistry.end() && it->second == ctx){\n\t\t\tm_contextRegistry.erase(it);\n\t\t}\n\t\tctx->contextID = 0;\n\t\treturn;\n\t}\n\n\t// 旧データや不整合状態に対するフォールバック。\n\tfor(auto it = m_contextRegistry.begin(); it != m_contextRegistry.end(); ++it){\n\t\tif(it->second == ctx){\n\t\t\tm_contextRegistry.erase(it);\n\t\t\tbreak;\n\t\t}\n\t}\n}\n"""
          )

          scene_cpp = "Source/GameApplication/Engine/Scene/scene.cpp"
          replace_once(
              scene_cpp,
              """\tm_SceneContext.entity = m_entityRegistry.get();\n\tm_SceneContext.component = m_componentRegistry.get();\n\tm_SceneContext.prefab = m_prefabSystem.get();\n\n\tauto graphicsContext = Renderer->GetGraphicsContext();\n""",
              """\tm_SceneContext.entity = m_entityRegistry.get();\n\tm_SceneContext.component = m_componentRegistry.get();\n\tm_SceneContext.prefab = m_prefabSystem.get();\n\n\t// Context IDを初期化時に発行し、描画や参照側で安定して利用できるようにする。\n\tif(m_SceneManagerContext->sceneManager){\n\t\tm_SceneManagerContext->sceneManager->GetIDFromContext(&m_SceneContext);\n\t}\n\n\tauto graphicsContext = Renderer->GetGraphicsContext();\n"""
          )
          replace_once(
              scene_cpp,
              """void Scene::Shutdown(){\n\tm_SceneManagerContext->debug->LOG_INFO((\"Scene[\" + SceneName + \"]を終了中...\").c_str());\n\n\tif(m_SceneManagerContext->editor){\n\t\tauto hierarchy = m_SceneManagerContext->editor->GetUI<Hierarchy>();\n\t\tif(hierarchy && hierarchy->sceneContext == &m_SceneContext){\n\t\t\thierarchy->sceneContext = nullptr;\n\t\t\thierarchy->selectedEntity = 0;\n\t\t}\n\t}\n\n\tResetAll();\n\n\t// レジストリの終了処理\n\tm_entityRegistry.reset();\n\tm_componentRegistry.reset();\n\tm_prefabSystem.reset();\n\tm_SceneManagerContext->debug->LOG_INFO((\"Scene[\" + SceneName + \"]を終了しました\").c_str());\n}\n""",
              """void Scene::Shutdown(){\n\t// 二重Shutdownを安全に無視する。\n\tif(!m_SceneManagerContext) return;\n\n\tSceneManagerContext* managerContext = m_SceneManagerContext;\n\tif(managerContext->debug){\n\t\tmanagerContext->debug->LOG_INFO((\"Scene[\" + SceneName + \"]を終了中...\").c_str());\n\t}\n\n\tif(managerContext->editor){\n\t\tauto hierarchy = managerContext->editor->GetUI<Hierarchy>();\n\t\tif(hierarchy && hierarchy->sceneContext == &m_SceneContext){\n\t\t\thierarchy->sceneContext = nullptr;\n\t\t\thierarchy->selectedEntity = 0;\n\t\t}\n\t}\n\n\t// Registryを破棄する前にContext IDを無効化する。\n\t// これ以降、古いEntityRefやPick結果からこのSceneは解決されない。\n\tif(managerContext->sceneManager){\n\t\tmanagerContext->sceneManager->UnregisterContext(&m_SceneContext);\n\t}\n\n\tResetAll();\n\n\t// ComponentRegistryはEntityRegistryを参照するため、Component側を先に破棄する。\n\tm_componentRegistry.reset();\n\tm_prefabSystem.reset();\n\tm_entityRegistry.reset();\n\n\t// SceneContextが破棄済みRegistryを指し続けないように明示的に無効化する。\n\tm_SceneContext.entity = nullptr;\n\tm_SceneContext.component = nullptr;\n\tm_SceneContext.system = nullptr;\n\tm_SceneContext.prefab = nullptr;\n\tm_SceneContext.manager = nullptr;\n\n\tif(managerContext->debug){\n\t\tmanagerContext->debug->LOG_INFO((\"Scene[\" + SceneName + \"]を終了しました\").c_str());\n\t}\n\tm_SceneManagerContext = nullptr;\n}\n"""
          )

          entity_ref_h = "Source/GameApplication/Engine/Scene/Reference/EntityRef.h"
          write(
              entity_ref_h,
              """// =======================================================================\n// \n// EntityRef.h\n// \n// =======================================================================\n#pragma once\n#include <cstdint>\n\n#include \"../Entity/Entity.h\"\n#include \"scene.h\"\n#include \"sceneManager.h\"\n#include \"Registry/entityRegistry.h\"\n\n// エンティティへの安全なリファレンス\n// 生のSceneContextポインタは保持せず、SceneManagerとContext IDから毎回解決する。\n// Scene破棄時にContext登録が解除されるため、破棄後の参照は安全に無効化される。\nstruct EntityRef {\n\tEntityRef() = default;\n\n\tEntityRef(Entity e, SceneContext* ctx)\n\t\t: m_entity(e) {\n\t\tif(!ctx || !ctx->manager || !ctx->manager->sceneManager){\n\t\t\treturn;\n\t\t}\n\n\t\tm_sceneManager = ctx->manager->sceneManager;\n\t\tm_contextID = m_sceneManager->GetIDFromContext(ctx);\n\t}\n\n\t// リファレンスが有効かどうかを確認する。\n\tbool IsValid() const {\n\t\tSceneContext* context = ResolveContext();\n\t\tif(!context || !context->entity) return false;\n\t\treturn context->entity->IsAlive(m_entity);\n\t}\n\n\t// エンティティIDを取得する（無効な場合は0を返す）。\n\tEntity Get() const {\n\t\treturn IsValid() ? m_entity : 0;\n\t}\n\n\t// 生のEntity IDを取得する（有効性チェックなし）。\n\tEntity GetEntityID() const { return m_entity; }\n\n\t// 現在有効なSceneContextをIDから解決する。\n\t// Sceneが破棄済みならnullptrを返す。\n\tSceneContext* GetScene() const { return ResolveContext(); }\n\n\tuint32_t GetContextID() const { return m_contextID; }\n\n\texplicit operator bool() const {\n\t\treturn IsValid();\n\t}\n\n\tbool operator==(const EntityRef& other) const {\n\t\treturn m_entity == other.m_entity &&\n\t\t\tm_sceneManager == other.m_sceneManager &&\n\t\t\tm_contextID == other.m_contextID;\n\t}\n\n\tbool operator!=(const EntityRef& other) const {\n\t\treturn !(*this == other);\n\t}\n\nprivate:\n\tSceneContext* ResolveContext() const {\n\t\tif(!m_sceneManager || m_contextID == 0) return nullptr;\n\t\treturn m_sceneManager->GetContextFromID(m_contextID);\n\t}\n\n\tEntity m_entity = 0;\n\tSceneManager* m_sceneManager = nullptr;\n\tuint32_t m_contextID = 0;\n};\n"""
          )

          plan_path = "Docs/ECS_Scheduler_Migration_Plan.md"
          plan = read(plan_path)
          old = "- [ ] SceneContext登録解除と寿命管理"
          new = "- [x] SceneContext登録解除と寿命管理"
          if plan.count(old) != 1:
              raise RuntimeError("SceneContext checklist entry not found")
          write(plan_path, plan.replace(old, new, 1))

          Path(".github/workflows/apply-scene-context-lifetime.yml").unlink()

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "fix: invalidate SceneContext references on shutdown"
          git push origin HEAD:refactor/ecs-scheduler-foundation
