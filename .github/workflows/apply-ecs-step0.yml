name: Apply ECS Step 0 fixes

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/apply-ecs-step0.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply targeted source fixes
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8-sig")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one match in {path}, found {count}"
                  )
              file_path.write_text(
                  text.replace(old, new, 1),
                  encoding="utf-8"
              )

          scene_manager_path = (
              "Source/GameApplication/Engine/Scene/sceneManager.cpp"
          )
          replace_once(
              scene_manager_path,
              """\t\t\tfor (auto& [name, scene] : m_activeScenes) {\n\n\t\t\t\tscene->Update(deltaTime);\n\t\t\t\tsystemRegistry->UpdateAll(deltaTime);\n\n\t\t\t\tscene->FixedUpdate(1.0f / TARGET_FPS);\n\t\t\t\tsystemRegistry->FixedUpdateAll(1.0f / TARGET_FPS);\n\t\t\t}\n""",
              """\t\t\t// Scene固有処理は各Sceneに対して実行する。\n\t\t\tfor (auto& [name, scene] : m_activeScenes) {\n\t\t\t\tscene->Update(deltaTime);\n\t\t\t}\n\n\t\t\t// System側が全Active Sceneを処理するため、Sceneループ外で一度だけ実行する。\n\t\t\tsystemRegistry->UpdateAll(deltaTime);\n\n\t\t\tconst float fixedDeltaTime = 1.0f / TARGET_FPS;\n\t\t\tfor (auto& [name, scene] : m_activeScenes) {\n\t\t\t\tscene->FixedUpdate(fixedDeltaTime);\n\t\t\t}\n\n\t\t\t// FixedUpdate系Systemも1ステップにつき一度だけ実行する。\n\t\t\tsystemRegistry->FixedUpdateAll(fixedDeltaTime);\n"""
          )

          physics_path = (
              "Source/GameApplication/Engine/Scene/System/Physic/"
              "physicSystem.cpp"
          )
          replace_once(
              physics_path,
              """\t\tconst auto& colliderEntity = context->component->FindEntitiesWithComponent<ColliderComponent>();\n\t\tif (colliderEntity.empty()) return;\n\t\tfor (Entity entity : colliderEntity) {\n""",
              """\t\tconst auto& colliderEntity = context->component->FindEntitiesWithComponent<ColliderComponent>();\n\t\tif (colliderEntity.empty()) continue;\n\t\tfor (Entity entity : colliderEntity) {\n"""
          )

          replace_once(
              physics_path,
              """\t\tfor (Entity entity : colliderEntity) {\n\t\t\tauto Collider = context->component->GetComponent<ColliderComponent>(entity);\n\t\t\tauto Transform = context->component->GetComponent<TransformComponent>(entity);\n\t\t\tif (!Transform) continue;\n\n\t\t\tphysx::PxTransform TmpTransform;\n\t\t\tif (Collider->pRigidbodyDynamic) TmpTransform = Collider->pRigidbodyDynamic->getGlobalPose();\n\t\t\tif (Collider->pRigidbodyStatic) TmpTransform = Collider->pRigidbodyStatic->getGlobalPose();\n\n\t\t\tTransform->position = Vector3(TmpTransform.p.x, TmpTransform.p.y, TmpTransform.p.z);\n\t\t\tTransform->SetRotation(DirectX::XMFLOAT4(TmpTransform.q.x, TmpTransform.q.y, TmpTransform.q.z, TmpTransform.q.w));\n\t\t}\n""",
              """\t\tfor (Entity entity : colliderEntity) {\n\t\t\tauto Collider = context->component->GetComponent<ColliderComponent>(entity);\n\t\t\tauto Transform = context->component->GetComponent<TransformComponent>(entity);\n\t\t\tif (!Collider || !Transform) continue;\n\n\t\t\t// Actorがまだ生成されていないColliderは結果同期の対象外。\n\t\t\tphysx::PxRigidActor* actor = nullptr;\n\t\t\tif (Collider->pRigidbodyDynamic) {\n\t\t\t\tactor = Collider->pRigidbodyDynamic;\n\t\t\t} else if (Collider->pRigidbodyStatic) {\n\t\t\t\tactor = Collider->pRigidbodyStatic;\n\t\t\t}\n\n\t\t\tif (!actor) continue;\n\n\t\t\tconst physx::PxTransform tmpTransform = actor->getGlobalPose();\n\n\t\t\tTransform->position = Vector3(\n\t\t\t\ttmpTransform.p.x,\n\t\t\t\ttmpTransform.p.y,\n\t\t\t\ttmpTransform.p.z\n\t\t\t);\n\t\t\tTransform->SetRotation(DirectX::XMFLOAT4(\n\t\t\t\ttmpTransform.q.x,\n\t\t\t\ttmpTransform.q.y,\n\t\t\t\ttmpTransform.q.z,\n\t\t\t\ttmpTransform.q.w\n\t\t\t));\n\t\t}\n"""
          )

          plan_path = "Docs/ECS_Scheduler_Migration_Plan.md"
          plan = Path(plan_path).read_text(encoding="utf-8")
          completed = {
              "- [ ] Step時にSystemがActive Scene数だけ重複実行される問題":
                  "- [x] Step時にSystemがActive Scene数だけ重複実行される問題",
              "- [ ] `PhysicSystem::Start()` の空Sceneでの早期 `return`":
                  "- [x] `PhysicSystem::Start()` の空Sceneでの早期 `return`",
              "- [ ] `PhysicSystem::FixedUpdate()` の未初期化 `PxTransform` 参照":
                  "- [x] `PhysicSystem::FixedUpdate()` の未初期化 `PxTransform` 参照",
          }
          for old, new in completed.items():
              if plan.count(old) != 1:
                  raise RuntimeError(f"Migration checklist entry not found: {old}")
              plan = plan.replace(old, new, 1)
          Path(plan_path).write_text(plan, encoding="utf-8")

          Path(".github/workflows/apply-ecs-step0.yml").unlink()

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "fix: resolve initial ECS migration blockers"
          git push origin HEAD:refactor/ecs-scheduler-foundation
