name: Route Component Operations

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/route-component-operations.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Route virtual calls through ComponentRegistry
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              "Source/GameApplication/Engine/Scene/scene.cpp": [
                  (
                      "YAML::Node encoded = comp->encode();",
                      "YAML::Node encoded = m_componentRegistry->EncodeComponent(comp);",
                      1,
                  ),
              ],
              "Source/GameApplication/Engine/Editor/UI/Inspector.cpp": [
                  (
                      "Component->inspector(context);",
                      "registry->InspectComponent(Component, context);",
                      1,
                  ),
              ],
              "Source/GameApplication/Engine/Editor/Command/ComponentCommand.h": [
                  (
                      "m_snapshot = comp->encode();",
                      "m_snapshot = m_context->component->EncodeComponent(comp);",
                      2,
                  ),
                  (
                      "m_snapshot = component->encode();",
                      "m_snapshot = context->component->EncodeComponent(component);",
                      1,
                  ),
              ],
          }

          for file_name, file_replacements in replacements.items():
              path = Path(file_name)
              text = path.read_text(encoding="utf-8-sig")

              for old, new, expected_count in file_replacements:
                  count = text.count(old)
                  if count != expected_count:
                      raise RuntimeError(
                          f"Expected {expected_count} occurrences of {old!r} "
                          f"in {file_name}, found {count}"
                      )
                  text = text.replace(old, new, expected_count)

              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/route-component-operations.yml").unlink()

      - name: Commit consumer migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "refactor: route component consumers through operations"
          git push origin HEAD:refactor/ecs-scheduler-foundation
