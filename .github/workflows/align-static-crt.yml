name: Align static CRT

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/align-static-crt.yml

permissions:
  contents: write

jobs:
  align:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Align CRT settings
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              "GameEngine.vcxproj": [
                  ("<RuntimeLibrary>MultiThreadedDebugDLL</RuntimeLibrary>",
                   "<RuntimeLibrary>MultiThreadedDebug</RuntimeLibrary>"),
                  ("<RuntimeLibrary>MultiThreadedDLL</RuntimeLibrary>",
                   "<RuntimeLibrary>MultiThreaded</RuntimeLibrary>"),
              ],
              "Script/Script.vcxproj": [
                  ("<RuntimeLibrary>MultiThreadedDebugDLL</RuntimeLibrary>",
                   "<RuntimeLibrary>MultiThreadedDebug</RuntimeLibrary>"),
                  ("<RuntimeLibrary>MultiThreadedDLL</RuntimeLibrary>",
                   "<RuntimeLibrary>MultiThreaded</RuntimeLibrary>"),
              ],
          }

          for file_name, pairs in replacements.items():
              path = Path(file_name)
              text = path.read_text(encoding="utf-8-sig")
              for old, new in pairs:
                  count = text.count(old)
                  if count != 1:
                      raise RuntimeError(
                          f"Expected one occurrence of {old} in {file_name}, found {count}"
                      )
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/align-static-crt.yml").unlink()

      - name: Commit CRT alignment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "build: align engine and script with static CRT"
          git push origin HEAD:refactor/ecs-scheduler-foundation
