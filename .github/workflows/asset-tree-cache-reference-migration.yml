name: Asset Tree Cache Reference Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/asset-tree-cache-reference-migration.yml
      - Tools/Migrations/fix_asset_tree_cache_reference.py

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply asset tree cache fix
        run: python Tools/Migrations/fix_asset_tree_cache_reference.py

      - name: Remove temporary migration files
        run: |
          rm Tools/Migrations/fix_asset_tree_cache_reference.py
          rm .github/workflows/asset-tree-cache-reference-migration.yml

      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Engine/Editor/UI/AssetsBrowser.cpp
          git add Tools/Migrations/fix_asset_tree_cache_reference.py
          git add .github/workflows/asset-tree-cache-reference-migration.yml
          git diff --cached --exit-code && exit 0
          git commit -m "fix: keep asset tree traversal stable across cache inserts [skip ci]"
          git push origin HEAD:refactor/ecs-scheduler-foundation
