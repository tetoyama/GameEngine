name: Apply SceneManager Include Decoupling

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Tools/Migration/decouple_scene_manager_registry.py
      - .github/workflows/apply-scene-manager-decoupling.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0
      - run: python Tools/Migration/decouple_scene_manager_registry.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git rm Tools/Migration/decouple_scene_manager_registry.py
          git rm .github/workflows/apply-scene-manager-decoupling.yml
          git add -A
          git commit -m "refactor: decouple SceneManager from SystemRegistry header"
          git push --force origin HEAD:scene-manager-decoupling-output
