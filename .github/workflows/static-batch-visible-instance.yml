name: Static Batch Visible Instance Contract

on:
  pull_request:
    branches: [master]
    paths:
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchVisibleInstanceBuffer.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchVisibleInstanceSelection.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchVisibleInstanceCompaction.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchPacketReplacementSet.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchViewSelectionPolicy.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchInstanceDataBuffer.h"
      - "Tests/StaticBatchVisibleInstanceBufferSmokeTest.cpp"
      - "Tests/StaticBatchVisiblePacketReplacementSmokeTest.cpp"
      - "Tests/StaticBatchViewSelectionPolicySmokeTest.cpp"
      - ".github/workflows/static-batch-visible-instance.yml"
  push:
    branches: [refactor/ecs-scheduler-foundation]
    paths:
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchVisibleInstanceBuffer.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchVisibleInstanceSelection.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchVisibleInstanceCompaction.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchPacketReplacementSet.h"
      - "Source/GameApplication/Engine/Scene/System/Render/StaticBatch/StaticBatchViewSelectionPolicy.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/StaticBatchInstanceDataBuffer.h"
      - "Tests/StaticBatchVisibleInstanceBufferSmokeTest.cpp"
      - "Tests/StaticBatchVisiblePacketReplacementSmokeTest.cpp"
      - "Tests/StaticBatchViewSelectionPolicySmokeTest.cpp"
      - ".github/workflows/static-batch-visible-instance.yml"
  workflow_dispatch:

concurrency:
  group: static-batch-visible-instance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  visible-instance-contract:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: Tests/StaticBatchVisibleInstanceBufferSmokeTest.cpp
            output: static-batch-visible-instance-test.exe
          - source: Tests/StaticBatchVisiblePacketReplacementSmokeTest.cpp
            output: static-batch-visible-packet-replacement-test.exe
          - source: Tests/StaticBatchViewSelectionPolicySmokeTest.cpp
            output: static-batch-view-selection-policy-test.exe
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run visible instance contract
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /D_CRT_SECURE_NO_WARNINGS
          /wd4100 /wd4201 /wd4458 /wd4471 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          ${{ matrix.source }}
          /Fe:${{ matrix.output }}
          /link /NODEFAULTLIB:yaml-cppd.lib
          && ${{ matrix.output }}
