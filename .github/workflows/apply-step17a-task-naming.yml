# The workflow is intentionally temporary and removes itself from the generated branch.
name: Apply Step 17-A Task Naming

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Tools/Migration/apply_step17a_task_naming.py
      - .github/workflows/apply-step17a-task-naming.yml
  pull_request:
    branches:
      - master
    types:
      - reopened
      - edited
    paths:
      - Tools/Migration/apply_step17a_task_naming.py
      - .github/workflows/apply-step17a-task-naming.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Correct audited document occurrence count
        shell: python
        run: |
          from pathlib import Path

          path = Path("Tools/Migration/apply_step17a_task_naming.py")
          text = path.read_text(encoding="utf-8")
          old = "for old, new in DOC_NAME_REPLACEMENTS:\n    replace_exact(step17_path, old, new, expected=1)"
          new = "for old, new in DOC_NAME_REPLACEMENTS:\n    expected = 2 if old == \"`RenderSystem.Draw`\" else 1\n    replace_exact(step17_path, old, new, expected=expected)"
          if text.count(old) != 1:
              raise RuntimeError("Step 17 document replacement loop was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Apply Step 17-A migration
        run: python Tools/Migration/apply_step17a_task_naming.py

      - name: Validate generated diff
        run: git diff --check

      - name: Publish generated branch
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git rm Tools/Migration/apply_step17a_task_naming.py
          git rm .github/workflows/apply-step17a-task-naming.yml
          git add -A
          git commit -m "refactor: normalize system task names"
          git push --force origin HEAD:step17a-task-naming-output
