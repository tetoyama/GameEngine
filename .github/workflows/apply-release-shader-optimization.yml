name: Enable Release shader optimization

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/apply-release-shader-optimization.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Enable shader optimization for Release x64
        shell: python
        run: |
          from pathlib import Path

          project_path = Path("GameEngine.vcxproj")
          project = project_path.read_text(encoding="utf-8-sig")

          old = "<DisableOptimizations>true</DisableOptimizations>"
          new = "<DisableOptimizations>false</DisableOptimizations>"
          if project.count(old) != 1:
              raise RuntimeError(
                  f"Expected exactly one Release shader optimization entry, found {project.count(old)}"
              )
          project_path.write_text(project.replace(old, new, 1), encoding="utf-8")

          plan_path = Path("Docs/ECS_Scheduler_Migration_Plan.md")
          plan = plan_path.read_text(encoding="utf-8")
          old_plan = "- [ ] Release Shader最適化設定の確認"
          new_plan = "- [x] Release Shader最適化設定の確認"
          if plan.count(old_plan) != 1:
              raise RuntimeError("Release shader checklist entry not found")
          plan_path.write_text(plan.replace(old_plan, new_plan, 1), encoding="utf-8")

          Path(".github/workflows/apply-release-shader-optimization.yml").unlink()

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "fix: enable shader optimization in Release builds"
          git push origin HEAD:refactor/ecs-scheduler-foundation
