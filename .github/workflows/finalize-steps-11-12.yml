name: Migration Plan Validation

on:
  pull_request:
    paths:
      - Docs/ECS_Scheduler_Migration_Plan.md
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Docs/ECS_Scheduler_Migration_Plan.md

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Validate Step headings
        shell: python
        run: |
          from pathlib import Path

          text = Path("Docs/ECS_Scheduler_Migration_Plan.md").read_text(
              encoding="utf-8-sig"
          )

          headings = [f"### Step {index}:" for index in range(21)]
          positions = []
          for heading in headings:
              count = text.count(heading)
              if count != 1:
                  raise RuntimeError(
                      f"Expected one heading for {heading!r}, found {count}"
                  )
              positions.append(text.index(heading))

          if positions != sorted(positions):
              raise RuntimeError("Step headings are not in numeric order")
