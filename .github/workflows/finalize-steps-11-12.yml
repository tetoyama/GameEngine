name: Migration Plan Validation

on:
  pull_request:
    paths:
      - Docs/ECS_Scheduler_Migration_Plan.md
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Docs/ECS_Scheduler_Migration_Plan.md

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Validate Step headings
        shell: python
        run: |
          import re
          from pathlib import Path

          text = Path("Docs/ECS_Scheduler_Migration_Plan.md").read_text(
              encoding="utf-8-sig"
          )

          positions = []
          for index in range(21):
              pattern = re.compile(
                  rf"^#+\s+Step\s+{index}(?:\.5)?:",
                  re.MULTILINE,
              )
              matches = list(pattern.finditer(text))
              if len(matches) != 1:
                  raise RuntimeError(
                      f"Expected one heading for Step {index}, found {len(matches)}"
                  )
              positions.append(matches[0].start())

          if positions != sorted(positions):
              raise RuntimeError("Step headings are not in numeric order")
