name: Finalize Job System Drain Behavior

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/finalize-steps-11-12.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Keep child job submission valid while draining
        shell: python
        run: |
          from pathlib import Path

          path = Path("Source/GameApplication/Engine/Scene/System/Job/JobSystem.h")
          text = path.read_text(encoding="utf-8-sig")

          old = """\t\tm_accepting.store(false, std::memory_order_release);
          \t\tlifecycleLock.unlock();

          \t\tstd::exception_ptr waitException;
          """
          new = """\t\tlifecycleLock.unlock();

          \t\tstd::exception_ptr waitException;
          """
          if text.count(old) != 1:
              raise RuntimeError("Stop begin block mismatch")
          text = text.replace(old, new, 1)

          old = """\t\tlifecycleLock.lock();
          \t\tm_stopping.store(true, std::memory_order_release);
          """
          new = """\t\tlifecycleLock.lock();
          \t\tm_accepting.store(false, std::memory_order_release);
          \t\tm_stopping.store(true, std::memory_order_release);
          """
          if text.count(old) != 1:
              raise RuntimeError("Stop shutdown block mismatch")
          text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")

          unused = Path("Source/GameApplication/Engine/Scene/System/Job/JobThreadContext.h")
          if unused.exists():
              unused.unlink()

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Engine/Scene/System/Job/JobSystem.h
          git add -u Source/GameApplication/Engine/Scene/System/Job/JobThreadContext.h
          git diff --cached --check
          git commit -m "fix: drain job system before closing submissions"
          git push origin HEAD:refactor/ecs-scheduler-foundation
