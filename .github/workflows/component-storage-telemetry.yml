name: Component Storage Telemetry Smoke Test

on:
  pull_request:
    branches:
      - master
    paths:
      - "Source/GameApplication/Engine/Scene/Interface/IComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Storage/DirectPagedComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Registry/componentRegistry.h"
      - "Source/GameApplication/Engine/Editor/UI/SceneStorageSettingsView.h"
      - "Tests/ComponentStorageTelemetrySmokeTest.cpp"
      - ".github/workflows/component-storage-telemetry.yml"
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - "Source/GameApplication/Engine/Scene/Interface/IComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Storage/DirectPagedComponentStorage.h"
      - "Source/GameApplication/Engine/Scene/Registry/componentRegistry.h"
      - "Source/GameApplication/Engine/Editor/UI/SceneStorageSettingsView.h"
      - "Tests/ComponentStorageTelemetrySmokeTest.cpp"
      - ".github/workflows/component-storage-telemetry.yml"
  workflow_dispatch:

concurrency:
  group: component-storage-telemetry-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run telemetry contract
        id: telemetry
        continue-on-error: true
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /wd4201 /wd4458 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          Tests/ComponentStorageTelemetrySmokeTest.cpp
          /Fe:component-storage-telemetry-test.exe
          > component-storage-telemetry.log 2>&1
          && component-storage-telemetry-test.exe >> component-storage-telemetry.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-storage-telemetry-diagnostics
          path: component-storage-telemetry.log
          if-no-files-found: error
      - name: Preserve smoke result
        if: steps.telemetry.outcome == 'failure'
        run: cmd /c exit 1
