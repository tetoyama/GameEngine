name: Frame Serial Compile Fix

on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: write

jobs:
  apply-frame-serial-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 2

      - name: Apply compile fixes
        run: python Tools/Migrations/fix_gpu_frame_serial_compile.py

      - name: Validate fixed contract
        shell: bash
        run: |
          if grep -RIn 'm_GpuFrameTimeValid' Source/GameApplication; then
            echo "Legacy GPU timing state remains"
            exit 1
          fi
          grep -n 'void ShiftSamples(std::array' \
            Source/GameApplication/Engine/Editor/UI/PerformanceMonitor.cpp
          grep -n 'm_ResolvedGpuFrameTimings.clear' \
            Source/GameApplication/Service/Graphics/graphicsContext.cpp

      - name: Commit fixed Source files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source
          git diff --cached --exit-code && exit 0
          git commit -m "fix: complete frame serial timing contract [skip ci]"
          git push origin HEAD:refactor/ecs-scheduler-foundation

  engine-debug-x64:
    needs: apply-frame-serial-fix
    runs-on: windows-latest

    steps:
      - name: Checkout fixed branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile GameEngine Debug x64
        run: >-
          msbuild GameEngine.vcxproj /t:Build /m
          /p:Configuration=Debug /p:Platform=x64
          /verbosity:minimal /consoleloggerparameters:ErrorsOnly

  engine-release-x64:
    needs: apply-frame-serial-fix
    runs-on: windows-latest

    steps:
      - name: Checkout fixed branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile GameEngine Release x64
        run: >-
          msbuild GameEngine.vcxproj /t:Build /m
          /p:Configuration=Release /p:Platform=x64
          /verbosity:minimal /consoleloggerparameters:ErrorsOnly

  script-debug-x64:
    needs: apply-frame-serial-fix
    runs-on: windows-latest

    steps:
      - name: Checkout fixed branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile Script Debug x64
        run: >-
          msbuild Script/Script.vcxproj /t:Build /m
          /p:Configuration=Debug /p:Platform=x64
          /verbosity:minimal /consoleloggerparameters:ErrorsOnly

  script-release-x64:
    needs: apply-frame-serial-fix
    runs-on: windows-latest

    steps:
      - name: Checkout fixed branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile Script Release x64
        run: >-
          msbuild Script/Script.vcxproj /t:Build /m
          /p:Configuration=Release /p:Platform=x64
          /verbosity:minimal /consoleloggerparameters:ErrorsOnly
