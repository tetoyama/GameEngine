name: Frame Serial Compile Diagnostics

on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: read

jobs:
  engine-debug-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile GameEngine Debug x64
        id: build
        continue-on-error: true
        run: >-
          msbuild GameEngine.vcxproj /t:Build /m
          /p:Configuration=Debug /p:Platform=x64
          /verbosity:minimal /consoleloggerparameters:ErrorsOnly
          /fileLogger
          /fileLoggerParameters:"LogFile=frame-serial-engine-errors.log;ErrorsOnly"

      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frame-serial-engine-errors
          path: frame-serial-engine-errors.log
          if-no-files-found: error

      - name: Preserve compile result
        if: steps.build.outcome == 'failure'
        run: cmd /c exit 1
