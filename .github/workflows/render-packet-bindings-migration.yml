name: Render Packet Binding Migration

on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: read

jobs:
  package-render-packet-migration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 2

      - name: Normalize legacy Renderable declarations
        shell: bash
        run: |
          find Source/GameApplication/Engine/Scene/System/Render/RenderSystem/Renderable \
            -name '*.h' -type f -print0 | \
            xargs -0 sed -i 's/)override;/) override;/g'

      - name: Run migration and capture diagnostics
        id: migration
        shell: bash
        run: |
          set +e
          python Tools/Migrations/add_render_packet_bindings.py > render-packet-migration.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Package migrated source files
        if: steps.migration.outputs.status == '0'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import zipfile

          raw = subprocess.check_output([
              'git', 'status', '--porcelain', '-z'
          ])
          paths = []
          for entry in raw.split(b'\0'):
              if not entry:
                  continue
              path = entry[3:].decode('utf-8')
              if path.startswith('Source/'):
                  paths.append(path)

          with zipfile.ZipFile(
              'render-packet-migrated-sources.zip',
              'w',
              compression=zipfile.ZIP_DEFLATED
          ) as archive:
              for path in sorted(set(paths)):
                  source = Path(path)
                  if source.is_file():
                      archive.write(source, arcname=path)

          print(f'Packaged {len(set(paths))} migrated source files.')
          PY

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-packet-migration-diagnostics
          path: render-packet-migration.log
          if-no-files-found: error

      - name: Upload migrated sources
        if: steps.migration.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: render-packet-migrated-sources
          path: render-packet-migrated-sources.zip
          if-no-files-found: error

      - name: Preserve migration result
        if: steps.migration.outputs.status != '0'
        run: |
          cat render-packet-migration.log
          exit 1
