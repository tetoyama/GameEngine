name: Apply PhysX DI Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Tools/Migration/patch_physx_owner.py
      - Tools/Migration/patch_physx_callback.py
      - .github/workflows/apply-physx-di.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply verified PhysX ownership migration
        run: |
          python Tools/Migration/patch_physx_owner.py
          python Tools/Migration/patch_physx_callback.py

      - name: Commit migration output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm Tools/Migration/patch_physx_owner.py
          git rm Tools/Migration/patch_physx_callback.py
          git rm .github/workflows/apply-physx-di.yml
          git add -A
          git commit -m "refactor: inject PhysX filter and callback ownership"
          git push --force origin HEAD:physx-di-output
