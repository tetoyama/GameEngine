name: Apply ViewWindow Registry Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - Tools/Migration/fix_viewwindow_registry.py
      - .github/workflows/apply-viewwindow-registry-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0
      - run: python Tools/Migration/fix_viewwindow_registry.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git rm Tools/Migration/fix_viewwindow_registry.py
          git rm .github/workflows/apply-viewwindow-registry-fix.yml
          git add -A
          git commit -m "fix: route ViewWindow through registry accessor"
          git push --force origin HEAD:viewwindow-registry-output
