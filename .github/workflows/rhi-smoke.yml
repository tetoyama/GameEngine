name: RHI Smoke Test

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - refactor/ecs-scheduler-foundation

concurrency:
  group: rhi-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rhi-smoke-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build RHI smoke test
        id: rhi_build
        continue-on-error: true
        shell: cmd
        run: >-
          cl /nologo /std:c++20 /EHsc /W4 /MTd
          /I Source/GameApplication
          Tests/RHISmokeTest.cpp
          /Fe:rhi-smoke.exe
          > rhi-smoke-build.log 2>&1

      - name: Upload RHI compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rhi-smoke-build-log
          path: rhi-smoke-build.log
          if-no-files-found: error

      - name: Preserve RHI build result
        if: steps.rhi_build.outcome == 'failure'
        run: cmd /c exit 1

      - name: Run RHI smoke test
        run: .\rhi-smoke.exe
