name: Animation Binding List Smoke Test

on:
  pull_request:
    branches: [master]
    paths:
      - "Source/GameApplication/Engine/Scene/Component/Operations/ModelRendererInspector*.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Animation/AnimationBindingList.h"
      - "Tests/AnimationBindingListSmokeTest.cpp"
      - ".github/workflows/animation-binding-list.yml"
  push:
    branches: [refactor/ecs-scheduler-foundation]
    paths:
      - "Source/GameApplication/Engine/Scene/Component/Operations/ModelRendererInspector*.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Animation/AnimationBindingList.h"
      - "Tests/AnimationBindingListSmokeTest.cpp"
      - ".github/workflows/animation-binding-list.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run binding contract
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /D_CRT_SECURE_NO_WARNINGS
          /wd4100 /wd4201 /wd4458 /wd4471 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/AnimationBindingListSmokeTest.cpp
          /Fe:animation-binding-list-test.exe
          /link /NODEFAULTLIB:yaml-cppd.lib
          && animation-binding-list-test.exe
