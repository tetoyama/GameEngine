name: Frame Latency Fallback Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/frame-latency-fallback-migration.yml
      - Tools/Migrations/fix_frame_latency_fallback.py

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0
      - run: python Tools/Migrations/fix_frame_latency_fallback.py
      - run: |
          rm Tools/Migrations/fix_frame_latency_fallback.py
          rm .github/workflows/frame-latency-fallback-migration.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Service/Graphics/graphicsContext.cpp
          git add Tools/Migrations/fix_frame_latency_fallback.py
          git add .github/workflows/frame-latency-fallback-migration.yml
          git diff --cached --exit-code && exit 0
          git commit -m "fix: keep frame latency fallback contract [skip ci]"
          git push origin HEAD:refactor/ecs-scheduler-foundation
