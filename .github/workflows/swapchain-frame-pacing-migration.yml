name: SwapChain Frame Pacing Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/swapchain-frame-pacing-migration.yml
      - Tools/Migrations/add_swapchain_frame_pacing.py

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply SwapChain frame pacing
        run: python Tools/Migrations/add_swapchain_frame_pacing.py

      - name: Remove temporary migration files
        run: |
          rm Tools/Migrations/add_swapchain_frame_pacing.py
          rm .github/workflows/swapchain-frame-pacing-migration.yml

      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Service/Graphics/graphicsContext.h
          git add Source/GameApplication/Service/Graphics/graphicsContext.cpp
          git add Source/GameApplication/Service/Runtime/TimeService/timeService.h
          git add Source/GameApplication/Service/Runtime/TimeService/timeService.cpp
          git add Source/GameApplication/Engine/engine.cpp
          git add Source/GameApplication/Engine/Editor/editorService.h
          git add Source/GameApplication/Engine/Editor/UI/PerformanceMonitor.h
          git add Source/GameApplication/Engine/Editor/UI/PerformanceMonitor.cpp
          git add Tools/Migrations/add_swapchain_frame_pacing.py
          git add .github/workflows/swapchain-frame-pacing-migration.yml
          git diff --cached --exit-code && exit 0
          git commit -m "perf: pace flip-model swapchain with waitable object [skip ci]"
          git push origin HEAD:refactor/ecs-scheduler-foundation
