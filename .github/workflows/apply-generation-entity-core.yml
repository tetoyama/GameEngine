name: Apply generation-aware Entity core

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/apply-generation-entity-core.yml

permissions:
  contents: write

jobs:
  apply-generation-entity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply generation-aware Entity changes
        shell: python
        run: |
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8-sig")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one match in {path}, found {count}"
                  )
              write(path, text.replace(old, new, 1))

          # ------------------------------------------------------------
          # Entity handle
          # ------------------------------------------------------------
          write(
              "Source/GameApplication/Engine/Scene/Entity/Entity.h",
              """// =======================================================================\n// \n// Entity.h\n// \n// =======================================================================\n#pragma once\n\n#include <compare>\n#include <concepts>\n#include <cstddef>\n#include <cstdint>\n#include <functional>\n\n// 実行時Entityハンドル。\n// indexはComponent Storageや保存データ上の識別子、generationは再利用検出に使う。\nstruct Entity {\n\tuint32_t index = 0;\n\tuint32_t generation = 0;\n\n\tconstexpr Entity() noexcept = default;\n\tconstexpr Entity(uint32_t indexValue) noexcept\n\t\t: index(indexValue), generation(0) {}\n\tconstexpr Entity(uint32_t indexValue, uint32_t generationValue) noexcept\n\t\t: index(indexValue), generation(generationValue) {}\n\n\tconstexpr uint32_t GetIndex() const noexcept { return index; }\n\tconstexpr uint32_t GetGeneration() const noexcept { return generation; }\n\n\tconstexpr uint64_t GetPackedValue() const noexcept {\n\t\treturn (static_cast<uint64_t>(generation) << 32) | index;\n\t}\n\n\tconstexpr explicit operator bool() const noexcept {\n\t\treturn index != 0;\n\t}\n\n\t// 既存の保存形式、GPU ObjectID、UI表示との移行互換用。\n\t// Entity同士の識別には必ずindexとgenerationの両方が使われる。\n\tconstexpr operator uint32_t() const noexcept {\n\t\treturn index;\n\t}\n\n\tconstexpr bool operator==(const Entity&) const noexcept = default;\n\tconstexpr auto operator<=>(const Entity&) const noexcept = default;\n\n\ttemplate<std::integral T>\n\tfriend constexpr bool operator==(Entity lhs, T rhs) noexcept {\n\t\treturn lhs.index == static_cast<uint32_t>(rhs);\n\t}\n\n\ttemplate<std::integral T>\n\tfriend constexpr bool operator==(T lhs, Entity rhs) noexcept {\n\t\treturn rhs == lhs;\n\t}\n\n\ttemplate<std::integral T>\n\tfriend constexpr auto operator<=>(Entity lhs, T rhs) noexcept {\n\t\treturn lhs.index <=> static_cast<uint32_t>(rhs);\n\t}\n\n\ttemplate<std::integral T>\n\tfriend constexpr auto operator<=>(T lhs, Entity rhs) noexcept {\n\t\treturn static_cast<uint32_t>(lhs) <=> rhs.index;\n\t}\n};\n\nnamespace std {\n\ttemplate<>\n\tstruct hash<Entity> {\n\t\tsize_t operator()(const Entity entity) const noexcept {\n\t\t\treturn hash<uint64_t>{}(entity.GetPackedValue());\n\t\t}\n\t};\n}\n"""
          )

          # ------------------------------------------------------------
          # EntityRegistry
          # ------------------------------------------------------------
          write(
              "Source/GameApplication/Engine/Scene/Registry/entityRegistry.h",
              """// =======================================================================\n// \n// entityRegistry.h\n// \n// =======================================================================\n#pragma once\n\n#include <algorithm>\n#include <cstdint>\n#include <unordered_set>\n#include <vector>\n\n#include \"Entity/Entity.h\"\n\n// Entityの生成・破棄・世代・生存状態を管理するレジストリ。\nclass EntityRegistry {\npublic:\n\tEntityRegistry() = default;\n\t~EntityRegistry() = default;\n\n\tEntity Create() {\n\t\tuint32_t index = 0;\n\n\t\tif(!m_recycledIndices.empty()){\n\t\t\tindex = m_recycledIndices.back();\n\t\t\tm_recycledIndices.pop_back();\n\t\t} else {\n\t\t\tindex = m_nextIndex++;\n\t\t}\n\n\t\tEnsureCapacity(index);\n\t\tm_aliveFlags[index] = true;\n\n\t\tconst Entity entity(index, m_generations[index]);\n\t\tm_alive.insert(entity);\n\t\treturn entity;\n\t}\n\n\t// Undo/Redo向けに同じindexを再利用する。\n\t// 要求された古いgenerationは復活させず、現在のgenerationを使用する。\n\tEntity CreateID(Entity requested) {\n\t\tconst uint32_t index = requested.GetIndex();\n\t\tif(index == 0) return {};\n\n\t\tEnsureCapacity(index);\n\n\t\tif(m_aliveFlags[index]){\n\t\t\treturn Entity(index, m_generations[index]);\n\t\t}\n\n\t\tif(m_nextIndex <= index){\n\t\t\tm_nextIndex = index + 1;\n\t\t}\n\n\t\tauto recycledIt = std::find(\n\t\t\tm_recycledIndices.begin(),\n\t\t\tm_recycledIndices.end(),\n\t\t\tindex\n\t\t);\n\t\tif(recycledIt != m_recycledIndices.end()){\n\t\t\tm_recycledIndices.erase(recycledIt);\n\t\t}\n\n\t\tm_aliveFlags[index] = true;\n\t\tconst Entity entity(index, m_generations[index]);\n\t\tm_alive.insert(entity);\n\t\treturn entity;\n\t}\n\n\tvoid Destroy(Entity entity) {\n\t\tif(!IsAlive(entity)){\n\t\t\treturn;\n\t\t}\n\n\t\tm_alive.erase(entity);\n\t\tm_aliveFlags[entity.GetIndex()] = false;\n\t\tIncrementGeneration(entity.GetIndex());\n\t\tm_recycledIndices.push_back(entity.GetIndex());\n\t}\n\n\tbool IsAlive(Entity entity) const {\n\t\tconst uint32_t index = entity.GetIndex();\n\t\tif(index == 0 || index >= m_aliveFlags.size()){\n\t\t\treturn false;\n\t\t}\n\n\t\treturn m_aliveFlags[index] &&\n\t\t\tm_generations[index] == entity.GetGeneration();\n\t}\n\n\t// GPU Pickや旧形式の保存データなど、indexしか持たない値から\n\t// 現在生存しているEntityハンドルを復元する。\n\tEntity Resolve(uint32_t index) const {\n\t\tif(index == 0 || index >= m_aliveFlags.size() || !m_aliveFlags[index]){\n\t\t\treturn {};\n\t\t}\n\t\treturn Entity(index, m_generations[index]);\n\t}\n\n\tuint32_t GetGeneration(uint32_t index) const {\n\t\treturn index < m_generations.size() ? m_generations[index] : 0;\n\t}\n\n\tconst std::unordered_set<Entity>& GetAllAlive() const {\n\t\treturn m_alive;\n\t}\n\n\t// 現在生存しているEntityをすべて破棄する。\n\t// generationと再利用候補は維持し、古い参照が復活しないようにする。\n\tvoid ResetAll() {\n\t\tconst std::vector<Entity> aliveCopy(m_alive.begin(), m_alive.end());\n\t\tfor(Entity entity : aliveCopy){\n\t\t\tDestroy(entity);\n\t\t}\n\t}\n\nprivate:\n\tvoid EnsureCapacity(uint32_t index) {\n\t\tif(index < m_generations.size()) return;\n\n\t\tconst size_t newSize = static_cast<size_t>(index) + 1;\n\t\tm_generations.resize(newSize, 0);\n\t\tm_aliveFlags.resize(newSize, false);\n\t}\n\n\tvoid IncrementGeneration(uint32_t index) {\n\t\tuint32_t& generation = m_generations[index];\n\t\t++generation;\n\n\t\t// 32bit周回時に初期generationへ戻ることを避ける。\n\t\tif(generation == 0){\n\t\t\t++generation;\n\t\t}\n\t}\n\n\tuint32_t m_nextIndex = 1;\n\tstd::vector<uint32_t> m_recycledIndices;\n\tstd::vector<uint32_t> m_generations{0};\n\tstd::vector<bool> m_aliveFlags{false};\n\tstd::unordered_set<Entity> m_alive;\n};\n"""
          )

          # ------------------------------------------------------------
          # Undo/Redo snapshot restore with generation remap
          # ------------------------------------------------------------
          write(
              "Source/GameApplication/Engine/Editor/Command/EntitySnapshotHelper.h",
              """// =======================================================================\n// \n// EntitySnapshotHelper.h\n// \n// =======================================================================\n#pragma once\n\n#include \"Entity/Entity.h\"\n#include \"Scene/scene.h\"\n#include \"Scene/Interface/IComponent.h\"\n#include \"Scene/Component/transformComponent.h\"\n#include \"Scene/Component/followComponent.h\"\n#include <yaml-cpp/yaml.h>\n#include <algorithm>\n#include <string>\n#include <typeindex>\n#include <unordered_map>\n#include <vector>\n\nnamespace EntityCommandHelper {\n\ninline void SetParent(Entity child, Entity newParent, SceneContext* ctx) {\n\tauto* childT = ctx->component->GetComponent<TransformComponent>(child);\n\tif(!childT) return;\n\n\tif(childT->parent != 0){\n\t\tauto* oldParentT = ctx->component->GetComponent<TransformComponent>(childT->parent);\n\t\tif(oldParentT){\n\t\t\tauto& children = oldParentT->children;\n\t\t\tchildren.erase(std::remove(children.begin(), children.end(), child), children.end());\n\t\t}\n\t}\n\n\tchildT->parent = newParent;\n\n\tif(newParent != 0){\n\t\tauto* newParentT = ctx->component->GetComponent<TransformComponent>(newParent);\n\t\tif(newParentT){\n\t\t\tnewParentT->children.push_back(child);\n\t\t}\n\t}\n}\n\nstruct EntitySnapshot {\n\tEntity entity;\n\tstd::vector<std::pair<std::string, YAML::Node>> components;\n};\n\nusing EntityRestoreMap = std::unordered_map<uint32_t, Entity>;\n\ninline void SnapshotRecursive(\n\tEntity entity,\n\tSceneContext* ctx,\n\tstd::vector<EntitySnapshot>& snapshots\n) {\n\tEntitySnapshot snapshot;\n\tsnapshot.entity = entity;\n\n\tconst auto& idToName = ctx->component->GetComponentIDToNameMap();\n\tfor(IComponent* component : ctx->component->GetAllComponentsOfEntitySorted(entity)){\n\t\tstd::type_index typeIndex(typeid(*component));\n\t\tComponentTypeID typeID = ctx->component->GetComponentIDByTypeIndex(typeIndex);\n\t\tif(typeID == static_cast<ComponentTypeID>(-1)) continue;\n\n\t\tauto nameIt = idToName.find(typeID);\n\t\tif(nameIt == idToName.end()) continue;\n\n\t\tsnapshot.components.emplace_back(nameIt->second, component->encode());\n\t}\n\tsnapshots.push_back(std::move(snapshot));\n\n\tauto* transform = ctx->component->GetComponent<TransformComponent>(entity);\n\tif(transform){\n\t\tfor(Entity child : transform->children){\n\t\t\tSnapshotRecursive(child, ctx, snapshots);\n\t\t}\n\t}\n}\n\ninline void DestroyRecursive(Entity entity, SceneContext* ctx) {\n\tif(!ctx->entity->IsAlive(entity)) return;\n\n\tauto* transform = ctx->component->GetComponent<TransformComponent>(entity);\n\tconst std::vector<Entity> children =\n\t\ttransform ? transform->children : std::vector<Entity>{};\n\n\tfor(Entity child : children){\n\t\tDestroyRecursive(child, ctx);\n\t}\n\n\tSetParent(entity, 0, ctx);\n\tctx->component->OnEntityDestroyed(entity);\n\tctx->entity->Destroy(entity);\n}\n\n// Snapshot内のEntityを同じindex・現在generationで復元し、\n// 旧indexから新しい実行時Entityへの対応表を返す。\ninline EntityRestoreMap RestoreAll(\n\tconst std::vector<EntitySnapshot>& snapshots,\n\tSceneContext* ctx\n) {\n\tEntityRestoreMap restoredEntities;\n\trestoredEntities.reserve(snapshots.size());\n\n\t// Pass 1: 全Entityを復元する。\n\tfor(const EntitySnapshot& snapshot : snapshots){\n\t\tconst Entity restored = ctx->entity->CreateID(snapshot.entity);\n\t\tif(restored){\n\t\t\trestoredEntities[snapshot.entity.GetIndex()] = restored;\n\t\t}\n\t}\n\n\t// Pass 2: 新しいgenerationのEntityへComponentを復元する。\n\tfor(const EntitySnapshot& snapshot : snapshots){\n\t\tauto entityIt = restoredEntities.find(snapshot.entity.GetIndex());\n\t\tif(entityIt == restoredEntities.end()) continue;\n\n\t\tfor(const auto& [name, node] : snapshot.components){\n\t\t\tctx->component->CreateFromYAML(name, entityIt->second, node);\n\t\t}\n\t}\n\n\tconst auto remapReference = [&](Entity serializedReference) -> Entity {\n\t\tconst uint32_t index = serializedReference.GetIndex();\n\t\tif(index == 0) return {};\n\n\t\tauto restoredIt = restoredEntities.find(index);\n\t\tif(restoredIt != restoredEntities.end()){\n\t\t\treturn restoredIt->second;\n\t\t}\n\n\t\t// Snapshot外の親や追従対象は、現在生存しているEntityへ接続する。\n\t\treturn ctx->entity->Resolve(index);\n\t};\n\n\t// Pass 3: Component内のEntity参照を現在generationへ変換する。\n\tfor(const auto& [oldIndex, restoredEntity] : restoredEntities){\n\t\tif(auto* transform = ctx->component->GetComponent<TransformComponent>(restoredEntity)){\n\t\t\ttransform->parent = remapReference(transform->parent);\n\t\t\ttransform->children.clear();\n\t\t}\n\n\t\tif(auto* follow = ctx->component->GetComponent<FollowComponent>(restoredEntity)){\n\t\t\tfollow->targetEntity = remapReference(follow->targetEntity);\n\t\t}\n\t}\n\n\t// Pass 4: 親参照からchildrenを再構築する。\n\tfor(const auto& [oldIndex, restoredEntity] : restoredEntities){\n\t\tauto* transform = ctx->component->GetComponent<TransformComponent>(restoredEntity);\n\t\tif(!transform || transform->parent == 0) continue;\n\n\t\tauto* parentTransform =\n\t\t\tctx->component->GetComponent<TransformComponent>(transform->parent);\n\t\tif(!parentTransform) continue;\n\n\t\tif(std::find(\n\t\t\tparentTransform->children.begin(),\n\t\t\tparentTransform->children.end(),\n\t\t\trestoredEntity\n\t\t) == parentTransform->children.end()){\n\t\t\tparentTransform->children.push_back(restoredEntity);\n\t\t}\n\t}\n\n\treturn restoredEntities;\n}\n\n} // namespace EntityCommandHelper\n"""
          )

          # ------------------------------------------------------------
          # Commands that must adopt the restored generation
          # ------------------------------------------------------------
          entity_command = "Source/GameApplication/Engine/Editor/Command/EntityCommand.h"
          replace_once(
              entity_command,
              """\tvoid Undo() override {\n\t\tif (!m_context || m_context->entity->IsAlive(m_entity)) return;\n\t\tEntityCommandHelper::RestoreAll(m_snapshots, m_context);\n\t\tif (m_onRestored) m_onRestored(m_entity, m_context);\n\t}\n""",
              """\tvoid Undo() override {\n\t\tif (!m_context || m_context->entity->IsAlive(m_entity)) return;\n\n\t\tauto restored = EntityCommandHelper::RestoreAll(m_snapshots, m_context);\n\t\tauto rootIt = restored.find(m_entity.GetIndex());\n\t\tif(rootIt == restored.end()) return;\n\n\t\tm_entity = rootIt->second;\n\t\tif (m_onRestored) m_onRestored(m_entity, m_context);\n\t}\n"""
          )
          replace_once(
              entity_command,
              """\t\tif (m_duplicated != 0) {\n\t\t\t// Redo: スナップショットから復元\n\t\t\tEntityCommandHelper::RestoreAll(m_snapshots, m_context);\n\t\t\tif (m_onDuplicated) m_onDuplicated(m_duplicated, m_context);\n\t\t\treturn;\n\t\t}\n""",
              """\t\tif (m_duplicated != 0) {\n\t\t\t// Redo: スナップショットから新しいgenerationで復元\n\t\t\tauto restored = EntityCommandHelper::RestoreAll(m_snapshots, m_context);\n\t\t\tauto rootIt = restored.find(m_duplicated.GetIndex());\n\t\t\tif(rootIt == restored.end()) return;\n\n\t\t\tm_duplicated = rootIt->second;\n\t\t\tif (m_onDuplicated) m_onDuplicated(m_duplicated, m_context);\n\t\t\treturn;\n\t\t}\n"""
          )
          replace_once(
              entity_command,
              """\t\tif (m_newParent != 0) {\n\t\t\t// Redo: スナップショットから新親を復元\n\t\t\tif (!m_context->entity->IsAlive(m_newParent))\n\t\t\t\tm_context->entity->CreateID(m_newParent);\n\t\t\tfor (auto& [compName, node] : m_snapshot)\n""",
              """\t\tif (m_newParent != 0) {\n\t\t\t// Redo: 同じindexを新しいgenerationで復元\n\t\t\tif (!m_context->entity->IsAlive(m_newParent))\n\t\t\t\tm_newParent = m_context->entity->CreateID(m_newParent);\n\t\t\tfor (auto& [compName, node] : m_snapshot)\n"""
          )

          prefab_command = "Source/GameApplication/Engine/Editor/Command/PrefabCommand.h"
          replace_once(
              prefab_command,
              """\t\tif (m_spawned != 0) {\n\t\t\t// Redo: スナップショットから復元\n\t\t\tEntityCommandHelper::RestoreAll(m_snapshots, m_context);\n\t\t\tif (m_onInstantiated) m_onInstantiated(EntityRef(m_spawned, m_context));\n\t\t\treturn;\n\t\t}\n""",
              """\t\tif (m_spawned != 0) {\n\t\t\t// Redo: スナップショットから新しいgenerationで復元\n\t\t\tauto restored = EntityCommandHelper::RestoreAll(m_snapshots, m_context);\n\t\t\tauto rootIt = restored.find(m_spawned.GetIndex());\n\t\t\tif(rootIt == restored.end()) return;\n\n\t\t\tm_spawned = rootIt->second;\n\t\t\tif (m_onInstantiated) m_onInstantiated(EntityRef(m_spawned, m_context));\n\t\t\treturn;\n\t\t}\n"""
          )

          # ------------------------------------------------------------
          # GPU Pick stores only the Entity index
          # ------------------------------------------------------------
          view_window = "Source/GameApplication/Engine/Editor/UI/ViewWindow.cpp"
          replace_once(
              view_window,
              """\t\t\t\tif(recoveredContext){\n\t\t\t\t\thierarchy->sceneContext = recoveredContext;\n\t\t\t\t\thierarchy->selectedEntity = (Entity)objectID_val;\n\n\t\t\t\t\t// 選択した Entity にカメラを向ける\n""",
              """\t\t\t\tif(recoveredContext){\n\t\t\t\t\tconst Entity pickedEntity = recoveredContext->entity->Resolve(objectID_val);\n\t\t\t\t\tif(!pickedEntity) return;\n\n\t\t\t\t\thierarchy->sceneContext = recoveredContext;\n\t\t\t\t\thierarchy->selectedEntity = pickedEntity;\n\n\t\t\t\t\t// 選択した Entity にカメラを向ける\n"""
          )

          # ------------------------------------------------------------
          # Inspector input also contains only an index
          # ------------------------------------------------------------
          follow_component = "Source/GameApplication/Engine/Scene/Component/followComponent.h"
          replace_once(
              follow_component,
              """\t\tint entityID = (int)targetEntity;\n\t\tif (ImGui::InputInt(\"##TargetEntity\", &entityID)) {\n\t\t\ttargetEntity = Entity(entityID);\n\t\t}\n""",
              """\t\tint entityID = static_cast<int>(targetEntity.GetIndex());\n\t\tif (ImGui::InputInt(\"##TargetEntity\", &entityID)) {\n\t\t\ttargetEntity = (context && entityID > 0)\n\t\t\t\t? context->entity->Resolve(static_cast<uint32_t>(entityID))\n\t\t\t\t: Entity{};\n\t\t}\n"""
          )

          # ------------------------------------------------------------
          # Migration checklist
          # ------------------------------------------------------------
          plan_path = "Docs/ECS_Scheduler_Migration_Plan.md"
          plan = read(plan_path)
          replacements = {
              "- [ ] `Entity` を `index + generation` に変更":
                  "- [x] `Entity` を `index + generation` に変更",
              "- [ ] `EntityRegistry` に世代配列を追加":
                  "- [x] `EntityRegistry` に世代配列を追加",
              "- [ ] `EntityRef` の有効性判定を世代対応":
                  "- [x] `EntityRef` の有効性判定を世代対応",
              "- [ ] Hash / YAML / PhysX userData対応":
                  "- [x] Hash / YAML / PhysX userData対応",
          }
          for old, new in replacements.items():
              if plan.count(old) != 1:
                  raise RuntimeError(f"Checklist entry not found: {old}")
              plan = plan.replace(old, new, 1)
          write(plan_path, plan)

          Path(".github/workflows/apply-generation-entity-core.yml").unlink()

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "refactor: add generation-aware Entity handles"
          git push origin HEAD:refactor/ecs-scheduler-foundation
