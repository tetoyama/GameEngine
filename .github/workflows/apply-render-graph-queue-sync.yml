name: Apply RenderGraph Queue Synchronization

on:
  pull_request:
    branches: [master]
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Apply hardened queue sync migration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('Docs/ECS_Scheduler_Migration_Plan.md')
          s = p.read_text(encoding='utf-8-sig')
          old = '''1. Step 16-FのQueue間同期
          2. Step 16-FのPass Culling
          3. D3D11最小実描画Triangle Test
          4. 既存Player View実機回帰
          5. Step 17-B Render Packet基盤
          6. Step 17-C Animation CPU Build / GPU Upload分離
          7. Step 17-D Terrain CPU Mesh Build / GPU Upload分離
          '''
          new = '''1. Step 16-FのQueue間同期
          2. Step 16-FのPass Culling
          3. D3D11最小実描画Triangle Test
          4. 既存Player View実機回帰
          5. Step 16完了報告
          6. Step 17 RenderWorld移行
          '''
          if s.count(old) != 1:
              raise RuntimeError('current work position mismatch')
          p.write_text(s.replace(old, new, 1), encoding='utf-8', newline='\n')
          PY
          python Tools/Migration/add_render_graph_queue_sync.py
          python Tools/Migration/queue_sync_v2_contract.py
          python Tools/Migration/queue_sync_v2_render_graph_resource.py
          python Tools/Migration/queue_sync_v2_execution_submit.py
          python Tools/Migration/queue_sync_v2_execution_state.py
          python Tools/Migration/queue_sync_v2_tests.py
          python Tools/Migration/queue_sync_v2_docs.py
          git add -A
          git diff --cached --check
          git diff --cached --binary > queue-sync.patch

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile RHI contracts
        shell: cmd
        run: |
          cl /nologo /std:c++20 /EHsc /W4 /MTd /I Source/GameApplication Tests/RHIRenderGraphBarrierSmokeTest.cpp /Fe:rhi-render-graph-queue-sync.exe
          cl /nologo /std:c++20 /EHsc /W4 /MTd /I Source/GameApplication Tests/D3D11RHIBackendSmokeTest.cpp d3d11.lib dxgi.lib /Fe:d3d11-rhi-queue-sync.exe

      - uses: microsoft/setup-msbuild@v2

      - name: Compile GameEngine Debug and Release x64
        shell: cmd
        run: |
          msbuild GameEngine.vcxproj /t:Build /m /p:Configuration=Debug /p:Platform=x64 /verbosity:minimal /consoleloggerparameters:ErrorsOnly
          msbuild GameEngine.vcxproj /t:Build /m /p:Configuration=Release /p:Platform=x64 /verbosity:minimal /consoleloggerparameters:ErrorsOnly

      - uses: actions/upload-artifact@v4
        with:
          name: render-graph-queue-sync-patch
          path: queue-sync.patch
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: render-graph-queue-sync-patch
      - name: Publish generated branch
        run: |
          git apply --index queue-sync.patch
          git config user.name github-actions
          git config user.email actions@github.com
          git commit -m "feat: add hardened RenderGraph queue synchronization"
          git push origin HEAD:render-graph-queue-sync-output
