name: Apply RenderGraph Pass Culling

on:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 1
          show-progress: false

      - name: Apply Pass Culling migration
        shell: bash
        run: |
          python Tools/Migration/add_render_graph_pass_culling.py
          git add -A
          git diff --cached --check
          git diff --cached --binary > pass-culling.patch

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile and run RenderGraph contracts
        shell: cmd
        run: |
          cl /nologo /std:c++20 /EHsc /W4 /MTd /I Source/GameApplication Tests/RHIRenderGraphBarrierSmokeTest.cpp /Fe:rhi-render-graph-pass-culling.exe
          rhi-render-graph-pass-culling.exe

      - uses: microsoft/setup-msbuild@v2

      - name: Compile GameEngine Debug and Release x64
        shell: cmd
        run: |
          msbuild GameEngine.vcxproj /t:Build /m /p:Configuration=Debug /p:Platform=x64 /verbosity:minimal /consoleloggerparameters:ErrorsOnly
          msbuild GameEngine.vcxproj /t:Build /m /p:Configuration=Release /p:Platform=x64 /verbosity:minimal /consoleloggerparameters:ErrorsOnly

      - uses: actions/upload-artifact@v4
        with:
          name: render-graph-pass-culling-patch
          path: pass-culling.patch
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 1
          show-progress: false
      - uses: actions/download-artifact@v4
        with:
          name: render-graph-pass-culling-patch
      - name: Publish generated branch
        run: |
          git apply --index pass-culling.patch
          git config user.name github-actions
          git config user.email actions@github.com
          git commit -m "feat: add conservative RenderGraph pass culling"
          git push --force origin HEAD:render-graph-pass-culling-output
