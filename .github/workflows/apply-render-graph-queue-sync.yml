name: Cleanup RenderGraph Queue Synchronization Migration

on:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 1
          show-progress: false

      - name: Remove completed migration helpers
        run: |
          git rm --ignore-unmatch \
            Tools/Migration/add_render_graph_queue_sync.py \
            Tools/Migration/queue_sync_v2_common.py \
            Tools/Migration/queue_sync_v2_base.py \
            Tools/Migration/queue_sync_v2_contract.py \
            Tools/Migration/queue_sync_v2_render_graph_resource.py \
            Tools/Migration/queue_sync_v2_execution_submit.py \
            Tools/Migration/queue_sync_v2_execution_state.py \
            Tools/Migration/queue_sync_v2_tests.py \
            Tools/Migration/queue_sync_v2_docs.py \
            Tools/Migration/queue_sync_v2_prepare.py \
            Tools/Migration/run_render_graph_queue_sync_base.py
          git diff --cached --check
          git config user.name github-actions
          git config user.email actions@github.com
          git commit -m "chore: remove completed queue sync migration helpers"
          git push --force origin HEAD:queue-sync-cleanup-output
