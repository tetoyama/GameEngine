name: Complete Camera Component Migration

on:
  push:
    branches:
      - refactor/ecs-scheduler-foundation
    paths:
      - .github/workflows/complete-camera-component-migration.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Integrate camera operations
        shell: python
        run: |
          from pathlib import Path

          component_path = Path(
              "Source/GameApplication/Engine/Scene/Component/cameraComponent.h"
          )
          text = component_path.read_text(encoding="utf-8-sig")

          def replace_function(source: str, signature: str, replacement: str) -> str:
              start = source.find(signature)
              if start < 0:
                  raise RuntimeError(f"Function signature not found: {signature!r}")

              brace = source.find("{", start)
              if brace < 0:
                  raise RuntimeError(f"Opening brace not found: {signature!r}")

              depth = 0
              index = brace
              while index < len(source):
                  char = source[index]
                  if char == "{":
                      depth += 1
                  elif char == "}":
                      depth -= 1
                      if depth == 0:
                          end = index + 1
                          if end < len(source) and source[end] == "\r":
                              end += 1
                          if end < len(source) and source[end] == "\n":
                              end += 1
                          return source[:start] + replacement + source[end:]
                  index += 1

              raise RuntimeError(f"Closing brace not found: {signature!r}")

          replacements = [
              (
                  "\tvoid CreateTexture(ID3D11Device* device, const Vector2& screenSize){",
                  "\tvoid CreateTexture(ID3D11Device* device, const Vector2& screenSize);\n",
              ),
              (
                  "\tvoid ResizeTexture(ID3D11Device* device, const Vector2& screenSize){",
                  "\tvoid ResizeTexture(ID3D11Device* device, const Vector2& screenSize);\n",
              ),
              (
                  "\tvoid Clear(ID3D11DeviceContext* context, const float clearColor[4]){",
                  "\tvoid Clear(ID3D11DeviceContext* context, const float clearColor[4]);\n",
              ),
              (
                  "    YAML::Node encode() override {",
                  "    YAML::Node encode() override;\n",
              ),
              (
                  "    bool decode(SceneContext* _context, const YAML::Node& node) override {",
                  "    bool decode(SceneContext* context, const YAML::Node& node) override;\n",
              ),
              (
                  "\tvoid InvalidatePostEffectGraphCache() {",
                  "\tvoid InvalidatePostEffectGraphCache();\n",
              ),
              (
                  "\tvoid RebuildPostEffectGraphCache() {",
                  "\tvoid RebuildPostEffectGraphCache();\n",
              ),
              (
                  "    const std::vector<int>& TopologicalSortPostEffects() {",
                  "    const std::vector<int>& TopologicalSortPostEffects();\n",
              ),
              (
                  "\tconst std::vector<int>& GetResolvedPostEffectInputs(int effectIndex) {",
                  "\tconst std::vector<int>& GetResolvedPostEffectInputs(int effectIndex);\n",
              ),
          ]

          for signature, replacement in replacements:
              text = replace_function(text, signature, replacement)

          include_block = (
              '\n#include "Operations/CameraPostEffectRuntime.h"\n'
              '#include "Operations/CameraComponentSerialization.h"\n'
              '#include "Operations/CameraPostEffectGraph.h"\n'
          )
          if "Operations/CameraPostEffectRuntime.h" in text:
              raise RuntimeError("Camera operations are already integrated")
          text = text.rstrip() + include_block

          component_path.write_text(text, encoding="utf-8")

          plan_path = Path("Docs/ECS_Scheduler_Migration_Plan.md")
          plan = plan_path.read_text(encoding="utf-8-sig")
          old = """### Step 10: Component純データ化

優先順位:

1. Transform
2. Follow
3. Camera
4. Light
5. Particle
6. Collider
7. ModelRenderer
8. Material
"""
          new = """### Step 10: Component純データ化

進捗:

- [x] Transform: YAML / Inspector / 行列計算 / Rect変換をOperationsへ分離
- [x] Follow: YAML / Inspector / 補間処理をOperationsへ分離
- [x] Camera: YAML / PostEffect GPU操作 / Graph処理をOperationsへ分離
- [ ] Light
- [ ] Particle
- [ ] Collider
- [ ] ModelRenderer
- [ ] Material

`CameraPostEffect`のGPUリソース所有権は、Step 17のRenderWorld移行時にRenderer側へ移す。
"""
          if old not in plan:
              raise RuntimeError("Step 10 plan block did not match expected content")
          plan_path.write_text(plan.replace(old, new, 1), encoding="utf-8")

          Path(".github/workflows/complete-camera-component-migration.yml").unlink()

      - name: Commit camera migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "refactor: complete camera component operations split"
          git push origin HEAD:refactor/ecs-scheduler-foundation
