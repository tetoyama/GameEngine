# Compile checks run on pull requests and branch pushes.
# Executable smoke tests are intentionally limited to manual workflow dispatch.
name: Windows Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - refactor/ecs-scheduler-foundation

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-di-repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Limit migration to source ownership changes
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("Tools/Migration/apply_di_repair.py")
          text = path.read_text(encoding="utf-8")
          marker = "# ----------------------------------------------------------------------\n# Keep compile checks frequent, but execute RHI tests only manually."
          if marker not in text:
              raise SystemExit("RHI workflow migration marker not found")
          path.write_text(text.split(marker, 1)[0] + 'print("DI source repair applied successfully")\n', encoding="utf-8")
          PY

      - name: Apply verified source replacements
        run: python Tools/Migration/apply_di_repair.py

      - name: Commit migration result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm Tools/Migration/apply_di_repair.py
          git add -A
          git commit -m "refactor: complete context-owned physics release path"
          git push origin HEAD:refactor/ecs-scheduler-foundation

  job-system-smoke-x64:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Job System smoke test
        run: >-
          cl /nologo /std:c++20 /EHsc /W4 /MTd
          /I Source/GameApplication/Engine/Scene
          Tests/JobSystemSmokeTest.cpp
          /Fe:job-system-smoke.exe

      - name: Run Job System smoke test
        run: .\job-system-smoke.exe

  schedule-executor-smoke-x64:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Schedule Executor smoke test
        run: >-
          cl /nologo /std:c++20 /EHsc /W4 /MTd
          /I Source/GameApplication/Engine/Scene
          Tests/DependencyScheduleExecutorSmokeTest.cpp
          /Fe:schedule-executor-smoke.exe

      - name: Run Schedule Executor smoke test
        run: .\schedule-executor-smoke.exe

  transform-rotation-smoke-x64:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Transform Rotation smoke test
        run: >-
          cl /nologo /std:c++20 /EHsc /W4 /MTd
          /I Source/GameApplication/Engine/Scene
          Tests/TransformRotationSmokeTest.cpp
          /Fe:transform-rotation-smoke.exe

      - name: Run Transform Rotation smoke test
        run: .\transform-rotation-smoke.exe

  script-debug-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile Script Debug x64
        run: >-
          msbuild Script/Script.vcxproj
          /t:Build
          /m
          /p:Configuration=Debug
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly

  script-release-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile Script Release x64
        run: >-
          msbuild Script/Script.vcxproj
          /t:Build
          /m
          /p:Configuration=Release
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly

  engine-debug-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile GameEngine Debug x64
        id: engine_build
        continue-on-error: true
        run: >-
          msbuild GameEngine.vcxproj
          /t:Build
          /m
          /p:Configuration=Debug
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly
          /fileLogger
          /fileLoggerParameters:"LogFile=engine-debug-errors.log;ErrorsOnly"

      - name: Upload engine debug compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-debug-build-errors
          path: engine-debug-errors.log
          if-no-files-found: warn

      - name: Preserve engine debug compile result
        if: steps.engine_build.outcome == 'failure'
        run: cmd /c exit 1

  engine-release-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile GameEngine Release x64
        id: engine_build
        continue-on-error: true
        run: >-
          msbuild GameEngine.vcxproj
          /t:Build
          /m
          /p:Configuration=Release
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly
          /fileLogger
          /fileLoggerParameters:"LogFile=engine-release-errors.log;ErrorsOnly"

      - name: Upload engine release compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-release-build-errors
          path: engine-release-errors.log
          if-no-files-found: warn

      - name: Preserve engine release compile result
        if: steps.engine_build.outcome == 'failure'
        run: cmd /c exit 1
