name: Windows Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - refactor/ecs-scheduler-foundation

permissions:
  contents: read

jobs:
  debug-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Debug x64
        run: >-
          msbuild GameEngine.sln
          /m
          /p:Configuration=Debug
          /p:Platform=x64
          /p:BuildProjectReferences=true
          /verbosity:minimal
