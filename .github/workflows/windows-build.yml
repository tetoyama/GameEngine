# Validates the Engine static CRT and Script DLL dynamic CRT configurations.
name: Windows Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - refactor/ecs-scheduler-foundation

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  migrate-camera-header:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: refactor/ecs-scheduler-foundation
          fetch-depth: 0

      - name: Replace camera component header
        shell: python
        run: |
          from pathlib import Path
          import base64

          encoded = ""
          target = Path("Source/GameApplication/Engine/Scene/Component/cameraComponent.h")
          desired = base64.b64decode(encoded)
          if target.read_bytes() != desired:
              target.write_bytes(desired)

      - name: Commit camera migration
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Source/GameApplication/Engine/Scene/Component/cameraComponent.h
          git diff --cached --check
          git commit -m "refactor: reduce camera component to state and compatibility API"
          git push origin HEAD:refactor/ecs-scheduler-foundation

  script-debug-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Script Debug x64
        run: >-
          msbuild Script/Script.vcxproj
          /t:Rebuild
          /m
          /p:Configuration=Debug
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly

  script-release-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Script Release x64
        run: >-
          msbuild Script/Script.vcxproj
          /t:Rebuild
          /m
          /p:Configuration=Release
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly

  engine-debug-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build GameEngine Debug x64
        id: engine_build
        continue-on-error: true
        run: >-
          msbuild GameEngine.vcxproj
          /t:Build
          /m
          /p:Configuration=Debug
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly
          /fileLogger
          /fileLoggerParameters:"LogFile=engine-debug-errors.log;ErrorsOnly"

      - name: Upload engine debug error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-debug-build-errors
          path: engine-debug-errors.log
          if-no-files-found: warn

      - name: Preserve engine debug build result
        if: steps.engine_build.outcome == 'failure'
        run: cmd /c exit 1

  engine-release-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build GameEngine Release x64
        id: engine_build
        continue-on-error: true
        run: >-
          msbuild GameEngine.vcxproj
          /t:Build
          /m
          /p:Configuration=Release
          /p:Platform=x64
          /verbosity:minimal
          /consoleloggerparameters:ErrorsOnly
          /fileLogger
          /fileLoggerParameters:"LogFile=engine-release-errors.log;ErrorsOnly"

      - name: Upload engine release error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-release-build-errors
          path: engine-release-errors.log
          if-no-files-found: warn

      - name: Preserve engine release build result
        if: steps.engine_build.outcome == 'failure'
        run: cmd /c exit 1
