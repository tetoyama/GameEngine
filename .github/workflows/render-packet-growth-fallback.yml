name: Render Packet Growth Fallback

on:
  pull_request:
    branches: [master]
    paths:
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Tests/RenderPacketGrowthFallbackSmokeTest.cpp"
      - ".github/workflows/render-packet-growth-fallback.yml"
  push:
    branches: [refactor/ecs-scheduler-foundation]
    paths:
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Tests/RenderPacketGrowthFallbackSmokeTest.cpp"
      - ".github/workflows/render-packet-growth-fallback.yml"
  workflow_dispatch:

concurrency:
  group: render-packet-growth-fallback-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run RenderPacket growth fallback contract
        id: render_packet_growth
        continue-on-error: true
        shell: cmd
        run: |
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX ^
            /D_CRT_SECURE_NO_WARNINGS ^
            /wd4100 /wd4201 /wd4458 /wd4471 /MTd ^
            /I Source ^
            /I Source/GameApplication ^
            /I Source/GameApplication/Backends ^
            /I Source/GameApplication/Engine ^
            /I Source/GameApplication/Engine/Scene ^
            /I Source/GameApplication/Service ^
            Tests/RenderPacketGrowthFallbackSmokeTest.cpp ^
            /Fe:render-packet-growth-fallback-test.exe ^
            > render-packet-growth-fallback.log 2>&1
          if errorlevel 1 exit /b 1
          render-packet-growth-fallback-test.exe >> render-packet-growth-fallback.log 2>&1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-packet-growth-fallback-diagnostics
          path: render-packet-growth-fallback.log
          if-no-files-found: error
      - name: Preserve smoke result
        if: steps.render_packet_growth.outcome == 'failure'
        run: cmd /c exit 1
