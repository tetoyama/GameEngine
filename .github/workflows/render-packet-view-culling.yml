name: Render Packet View Culling Smoke Test

on:
  pull_request:
    branches:
      - master
    paths:
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/CullingFrustumRuntime.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/CullingVisibilityBuilder.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/CullingVisibilitySet.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/RenderPacketViewCulling.h"
      - "Source/GameApplication/Engine/Scene/System/Render/Culling/ShadowRenderPacketCullingView.h"
      - "Source/GameApplication/Engine/Scene/System/Render/RenderSystem/RenderPacket/RenderPacketBuffer.h"
      - "Tests/RenderPacketViewCullingSmokeTest.cpp"
      - ".github/workflows/render-packet-view-culling.yml"
  push:
    branches:
      - refactor/ecs-scheduler-foundation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Compile and run per-view packet culling contract
        shell: cmd
        run: >-
          cl /nologo /utf-8 /std:c++20 /EHsc /W4 /WX
          /wd4100 /wd4201 /wd4458 /wd4471 /MTd
          /I Source
          /I Source/GameApplication
          /I Source/GameApplication/Backends
          /I Source/GameApplication/Engine
          /I Source/GameApplication/Engine/Scene
          /I Source/GameApplication/Service
          Tests/RenderPacketViewCullingSmokeTest.cpp
          Source/GameApplication/Engine/Scene/Registry/componentRegistry.cpp
          /Fe:render-packet-view-culling-test.exe
          /link /NODEFAULTLIB:yaml-cppd.lib
          && render-packet-view-culling-test.exe
